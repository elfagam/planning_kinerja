<!doctype html>
<html lang="id">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Login - E-Planning RSUD</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link href="/assets/css/app.css" rel="stylesheet" />
  </head>
  <body class="bg-soft-pattern">
    <main class="container py-5">
      <div class="row justify-content-center">
        <section class="col-12 col-md-8 col-lg-5" aria-label="Login Form">
          <div class="card border-0 shadow-sm">
            <div class="card-body p-4">
              <h1 class="h4 mb-2">Login E-Planning</h1>
              <p class="text-muted small mb-4">
                Masuk menggunakan akun yang dikonfigurasi di server.
              </p>

              <form id="login-form" class="vstack gap-3" autocomplete="off">
                <div>
                  <label class="form-label" for="username"
                    >Email / Username</label
                  >
                  <input
                    id="username"
                    class="form-control"
                    placeholder="Masukkan email atau username"
                    required
                  />
                </div>

                <div>
                  <label class="form-label" for="password">Password</label>
                  <input
                    id="password"
                    type="password"
                    class="form-control"
                    placeholder="Masukkan password"
                    required
                  />
                </div>

                <div>
                  <label class="form-label" for="default-year"
                    >Tahun Default</label
                  >
                  <input
                    id="default-year"
                    type="number"
                    min="2000"
                    max="2100"
                    class="form-control"
                    placeholder="2026"
                    required
                  />
                  <small class="text-muted"
                    >Dipakai sebagai tahun awal pada form perencanaan.</small
                  >
                </div>

                <button type="submit" class="btn btn-primary">Masuk</button>
                <small id="status" class="text-muted" aria-live="polite"
                  >Siap</small
                >
              </form>
            </div>
          </div>
        </section>
      </div>
    </main>

    <script src="/assets/js/auth-client.js"></script>
    <script>
      (() => {
        const form = document.getElementById("login-form");
        const usernameInput = document.getElementById("username");
        const passwordInput = document.getElementById("password");
        const defaultYearInput = document.getElementById("default-year");
        const status = document.getElementById("status");
        const DEFAULT_YEAR_KEY = "DEFAULT_YEAR";
        const DEFAULT_YEAR_USER_PREFIX = "DEFAULT_YEAR_USER_";

        function fallbackYear() {
          return String(new Date().getFullYear());
        }

        function resolveDefaultYear() {
          const stored = String(
            localStorage.getItem(DEFAULT_YEAR_KEY) || "",
          ).trim();
          const year = Number(stored);
          if (Number.isInteger(year) && year >= 2000 && year <= 2100) {
            return String(year);
          }
          return fallbackYear();
        }

        function userYearStorageKey(userID) {
          return `${DEFAULT_YEAR_USER_PREFIX}${userID}`;
        }

        async function saveDefaultYearForCurrentUser(defaultYear) {
          const token =
            window.__AUTH__?.getAccessToken?.() ||
            localStorage.getItem("AUTH_TOKEN") ||
            localStorage.getItem("authToken") ||
            "";
          if (!token) {
            return;
          }

          const res = await fetch("/api/v1/auth/me", {
            headers: {
              Accept: "application/json",
              Authorization: `Bearer ${token}`,
            },
          });

          if (!res.ok) {
            return;
          }

          const payload = await res.json();
          if (!payload?.success || !payload?.data) {
            return;
          }

          const userID = Number(
            payload.data.user_id ?? payload.data.userID ?? 0,
          );
          if (!userID) {
            return;
          }

          localStorage.setItem(userYearStorageKey(userID), String(defaultYear));
        }

        function setStatus(message, isError = false) {
          status.textContent = message;
          status.className = isError ? "text-danger small" : "text-muted small";
        }

        function nextPath() {
          return "/ui/dashboard";
        }

        defaultYearInput.value = resolveDefaultYear();

        form.addEventListener("submit", async (event) => {
          event.preventDefault();
          const defaultYear = Number(defaultYearInput.value || 0);
          if (
            !Number.isInteger(defaultYear) ||
            defaultYear < 2000 ||
            defaultYear > 2100
          ) {
            setStatus("Tahun default wajib diisi (2000-2100)", true);
            defaultYearInput.focus();
            return;
          }

          localStorage.setItem(DEFAULT_YEAR_KEY, String(defaultYear));
          setStatus("Memproses login...");

          try {
            await window.__AUTH__.login(
              usernameInput.value.trim(),
              passwordInput.value,
            );
            await saveDefaultYearForCurrentUser(defaultYear);
            setStatus("Login berhasil");
            // Redirect to next path or dashboard
            window.location.href = nextPath();
          } catch (error) {
            setStatus(error.message || "Login gagal", true);
          }
        });
      })();
    </script>
  </body>
</html>
