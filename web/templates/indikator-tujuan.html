<!doctype html>
<html lang="id">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Indikator Tujuan - E-Planning RSUD</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link href="/assets/css/app.css" rel="stylesheet" />
    <script src="/assets/js/auth-client.js?v=20260326"></script>
    <style>
      .panel-soft {
        background: rgba(255, 255, 255, 0.9);
        border: 1px solid rgba(16, 74, 101, 0.1);
      }

      .muted-label {
        font-size: 0.78rem;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        color: #5d7380;
      }
    </style>
  </head>
  <body class="bg-soft-pattern" data-api-endpoint="/api/v1/indikator_tujuan">
    <div class="container py-4">
      <header
        class="mb-4 p-4 card shadow-sm border-0 header-gradient text-white"
      >
        <h1 class="h3 mb-1">Manajemen Indikator Tujuan</h1>
        <p class="mb-0 opacity-75">
          Kelola indikator tujuan untuk memantau capaian strategis
        </p>
      </header>

      <div class="row g-4">
        <div class="col-lg-4">
          <div class="card border-0 shadow-sm panel-soft">
            <div class="card-body">
              <h2 class="h6 mb-3">Form Indikator Tujuan</h2>
              <form id="indikator-form" class="vstack gap-2">
                <input type="hidden" id="entity-id" />
                <label class="form-label mb-0 muted-label">Tujuan</label>
                <select id="tujuanId" class="form-select" required>
                  <option value="">Pilih tujuan</option>
                </select>
                <label class="form-label mb-0 muted-label">Kode</label>
                <input
                  id="kode"
                  class="form-control"
                  placeholder="ITJ-001"
                  required
                />
                <label class="form-label mb-0 muted-label"
                  >Nama Indikator</label
                >
                <input
                  id="nama"
                  class="form-control"
                  placeholder="Persentase kepatuhan SOP"
                  required
                />
                <label class="form-label mb-0 muted-label">Formula</label>
                <textarea
                  id="formula"
                  class="form-control"
                  rows="3"
                  placeholder="(jumlah patuh / total audit) * 100"
                ></textarea>
                <div class="row g-2">
                  <div class="col-6">
                    <label class="form-label mb-0 muted-label">Satuan</label>
                    <input id="satuan" class="form-control" placeholder="%" />
                  </div>
                  <div class="col-6">
                    <label class="form-label mb-0 muted-label">Baseline</label>
                    <input
                      id="baseline"
                      type="number"
                      step="0.01"
                      class="form-control"
                      value="0"
                    />
                  </div>
                </div>
                <div class="d-flex gap-2 mt-2">
                  <button type="submit" class="btn btn-primary">Simpan</button>
                  <button
                    type="button"
                    id="btn-reset"
                    class="btn btn-outline-secondary"
                  >
                    Reset
                  </button>
                </div>
                <small id="status-text" class="text-muted">Siap</small>
              </form>
            </div>
          </div>
        </div>

        <div class="col-lg-8">
          <div class="card border-0 shadow-sm panel-soft">
            <div class="card-body">
              <div
                class="d-flex justify-content-between align-items-center mb-3"
              >
                <h2 class="h6 text-uppercase text-muted mb-0">
                  Daftar Indikator Tujuan
                </h2>
                <a href="/ui/dashboard" class="btn btn-sm btn-outline-dark"
                  >Kembali ke Dashboard</a
                >
              </div>
              <div class="row g-2 mb-3">
                <div class="col-md-5">
                  <input
                    id="query"
                    class="form-control"
                    placeholder="Cari nama atau kode"
                  />
                </div>
                <div class="col-md-7 d-grid">
                  <button
                    id="btn-search"
                    type="button"
                    class="btn btn-outline-primary"
                  >
                    Cari / Refresh
                  </button>
                </div>
              </div>
              <div class="table-responsive">
                <table class="table table-striped table-hover align-middle">
                  <thead>
                    <tr>
                      <th>ID</th>
                      <th>Tujuan</th>
                      <th>Kode</th>
                      <th>Nama Indikator</th>
                      <th>Satuan</th>
                      <th>Baseline</th>
                      <th>Formula</th>
                      <th>Aksi</th>
                    </tr>
                  </thead>
                  <tbody id="table-body"></tbody>
                </table>
              </div>
              <div
                class="d-flex justify-content-between align-items-center mt-2"
              >
                <small id="meta-text" class="text-muted">Total 0 data</small>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script>
      (() => {
        const endpoint = document.body.dataset.apiEndpoint;
        const tujuanEndpoint = "/api/v1/tujuan";
        const misiEndpoint = "/api/v1/misi";
        const form = document.getElementById("indikator-form");
        const idInput = document.getElementById("entity-id");
        const tujuanIdInput = document.getElementById("tujuanId");
        const kodeInput = document.getElementById("kode");
        const namaInput = document.getElementById("nama");
        const formulaInput = document.getElementById("formula");
        const satuanInput = document.getElementById("satuan");
        const baselineInput = document.getElementById("baseline");
        const statusText = document.getElementById("status-text");
        const queryInput = document.getElementById("query");
        const btnSearch = document.getElementById("btn-search");
        const btnReset = document.getElementById("btn-reset");
        const tableBody = document.getElementById("table-body");
        const metaText = document.getElementById("meta-text");

        const misiMap = new Map();
        const tujuanMap = new Map();

        const MUTATION_ROLES = new Set(["ADMIN", "PERENCANA", "OPERATOR"]);
        let currentUserRole = "";
        let roleResolved = false;

        function normalizeRole(raw) {
          return String(raw || "")
            .trim()
            .toUpperCase();
        }

        function canMutateByRole(role) {
          return MUTATION_ROLES.has(normalizeRole(role));
        }

        function applyRoleAccess() {
          const controls = form.querySelectorAll(
            "input, textarea, select, button[type='submit']",
          );
          const existingInfo = form.querySelector(
            '[data-role-readonly-msg="1"]',
          );

          if (!roleResolved || canMutateByRole(currentUserRole)) {
            controls.forEach((el) => {
              el.disabled = false;
            });
            if (existingInfo) {
              existingInfo.remove();
            }
            return;
          }

          controls.forEach((el) => {
            el.disabled = true;
          });

          if (!existingInfo) {
            const info = document.createElement("p");
            info.className = "text-warning small mt-2 mb-0";
            info.setAttribute("data-role-readonly-msg", "1");
            info.textContent =
              "Mode baca saja — role Anda tidak memiliki hak untuk mengubah data form indikator tujuan.";
            form.appendChild(info);
          }
        }

        function decodeJwtPayload(token) {
          if (!token || token.split(".").length < 2) {
            return null;
          }
          try {
            const base64 = token
              .split(".")[1]
              .replace(/-/g, "+")
              .replace(/_/g, "/");
            const padded =
              base64 + "=".repeat((4 - (base64.length % 4 || 4)) % 4);
            return JSON.parse(atob(padded));
          } catch (_) {
            return null;
          }
        }

        function pickFreshestToken() {
          const keys = ["AUTH_TOKEN", "authToken"];
          let chosen = "";
          let chosenIat = -1;

          keys.forEach((key) => {
            const token = localStorage.getItem(key) || "";
            if (!token) return;
            const payload = decodeJwtPayload(token);
            const iat = Number(payload?.iat || 0);
            if (!chosen || iat > chosenIat) {
              chosen = token;
              chosenIat = iat;
            }
          });

          return chosen;
        }

        function authHeader() {
          const token = pickFreshestToken();
          return token ? { Authorization: `Bearer ${token}` } : {};
        }

        function setStatus(message, isError = false) {
          statusText.textContent = message;
          statusText.className = isError
            ? "text-danger small"
            : "text-success small";
        }

        function normalizeItem(item) {
          return {
            id: item.id ?? item.ID,
            tujuanId: item.tujuan_id ?? item.TujuanID,
            kode: item.kode ?? item.Kode,
            nama: item.nama ?? item.Nama,
            formula: item.formula ?? item.Formula,
            satuan: item.satuan ?? item.Satuan,
            baseline: item.baseline ?? item.Baseline ?? 0,
          };
        }


        function resetForm() {
          idInput.value = "";
          tujuanIdInput.value = "";
          kodeInput.value = "";
          namaInput.value = "";
          formulaInput.value = "";
          satuanInput.value = "";
          baselineInput.value = "0";
        }

        function tujuanLabel(tujuanId) {
          return tujuanMap.get(Number(tujuanId)) || `Tujuan #${tujuanId}`;
        }

        function rowTemplate(item) {
          const tr = document.createElement("tr");
          const canMutate = !roleResolved || canMutateByRole(currentUserRole);
          tr.innerHTML = `
            <td>${item.id}</td>
            <td>${tujuanLabel(item.tujuanId)}</td>
            <td>${item.kode}</td>
            <td>${item.nama}</td>
            <td>${item.satuan || "-"}</td>
            <td>${Number(item.baseline || 0).toLocaleString("id-ID")}</td>
            <td>${item.formula || "-"}</td>
            <td class="text-nowrap">
              ${canMutate ? '<button class="btn btn-sm btn-outline-primary me-1" data-action="edit">Edit</button><button class="btn btn-sm btn-outline-danger" data-action="delete">Hapus</button>' : '<span class="text-muted small">Read-only</span>'}
            </td>
          `;

          tr.querySelector('[data-action="edit"]')?.addEventListener(
            "click",
            () => {
              idInput.value = item.id;
              tujuanIdInput.value = item.tujuanId;
              kodeInput.value = item.kode;
              namaInput.value = item.nama;
              formulaInput.value = item.formula || "";
              satuanInput.value = item.satuan || "";
              baselineInput.value = String(item.baseline ?? 0);
              setStatus(`Mode edit ID ${item.id}`);
            },
          );

          tr.querySelector('[data-action="delete"]')?.addEventListener(
            "click",
            async () => {
              if (!confirm(`Hapus indikator tujuan ${item.nama}?`)) {
                return;
              }
              try {
                await fetchJSON(`${endpoint}/${item.id}`, { method: "DELETE" });
                setStatus("Data berhasil dihapus");
                if (Number(idInput.value) === item.id) {
                  resetForm();
                }
                await loadList();
              } catch (error) {
                setStatus(error.message, true);
              }
            },
          );

          return tr;
        }

        async function loadTujuanOptions() {
          try {
            const [misiData, tujuanData] = await Promise.all([
              fetchJSON(misiEndpoint),
              fetchJSON(tujuanEndpoint),
            ]);

            const misiItems = Array.isArray(misiData?.items)
              ? misiData.items
              : [];
            const tujuanItems = Array.isArray(tujuanData?.items)
              ? tujuanData.items
              : [];

            misiMap.clear();
            misiItems.forEach((raw) => {
              const id = Number(raw.id ?? raw.ID);
              const kode = raw.kode ?? raw.Kode;
              const nama = raw.nama ?? raw.Nama;
              misiMap.set(id, `${kode} - ${nama}`);
            });

            tujuanIdInput.innerHTML = '<option value="">Pilih tujuan</option>';
            tujuanMap.clear();
            tujuanItems.forEach((raw) => {
              const id = Number(raw.id ?? raw.ID);
              const misiId = Number(raw.misi_id ?? raw.MisiID);
              const kode = raw.kode ?? raw.Kode;
              const nama = raw.nama ?? raw.Nama;
              const misiText = misiMap.get(misiId) || `Misi #${misiId}`;
              const label = `${misiText} / ${kode} - ${nama}`;

              tujuanMap.set(id, label);

              const option = document.createElement("option");
              option.value = String(id);
              option.textContent = label;
              tujuanIdInput.appendChild(option);
            });
          } catch (error) {
            setStatus(`Gagal memuat daftar tujuan: ${error.message}`, true);
          }
        }

        async function loadList() {
          tableBody.innerHTML =
            '<tr><td colspan="8" class="text-center text-muted py-4">Memuat...</td></tr>';
          try {
            const params = new URLSearchParams();
            const q = queryInput.value.trim();
            if (q) {
              params.set("q", q);
            }
            const url = params.toString()
              ? `${endpoint}?${params.toString()}`
              : endpoint;
            const data = await fetchJSON(url);
            const items = Array.isArray(data?.items)
              ? data.items.map(normalizeItem)
              : [];

            tableBody.innerHTML = "";
            if (items.length === 0) {
              tableBody.innerHTML =
                '<tr><td colspan="8" class="text-center text-muted py-4">Belum ada data</td></tr>';
            } else {
              items.forEach((item) => tableBody.appendChild(rowTemplate(item)));
            }
            metaText.textContent = `Total ${items.length} data`;
          } catch (error) {
            tableBody.innerHTML =
              '<tr><td colspan="8" class="text-center text-danger py-4">Gagal memuat data</td></tr>';
            setStatus(error.message, true);
          }
        }

        form.addEventListener("submit", async (event) => {
          event.preventDefault();

          if (roleResolved && !canMutateByRole(currentUserRole)) {
            setStatus(
              "Anda tidak memiliki hak akses untuk menyimpan perubahan",
              true,
            );
            return;
          }

          const payload = {
            tujuan_id: Number(tujuanIdInput.value),
            kode: kodeInput.value.trim(),
            nama: namaInput.value.trim(),
            formula: formulaInput.value.trim(),
            satuan: satuanInput.value.trim(),
            baseline: Number(baselineInput.value || 0),
          };

          if (!payload.tujuan_id || !payload.kode || !payload.nama) {
            setStatus("Tujuan, kode, dan nama wajib diisi", true);
            return;
          }

          const id = idInput.value.trim();
          const isEdit = Boolean(id);
          const url = isEdit ? `${endpoint}/${id}` : endpoint;
          const method = isEdit ? "PUT" : "POST";

          try {
            await fetchJSON(url, {
              method,
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify(payload),
            });

            setStatus(
              isEdit ? "Data berhasil diperbarui" : "Data berhasil disimpan",
            );
            resetForm();
            await loadList();
          } catch (error) {
            setStatus(error.message, true);
          }
        });

        btnSearch.addEventListener("click", () => {
          loadList();
        });

        queryInput.addEventListener("keydown", (event) => {
          if (event.key === "Enter") {
            event.preventDefault();
            loadList();
          }
        });

        btnReset.addEventListener("click", () => {
          resetForm();
          setStatus("Form direset");
        });

        async function loadCurrentUser() {
          try {
            const token = pickFreshestToken();
            if (!token) {
              roleResolved = false;
              return;
            }
            const res = await fetch("/api/v1/auth/me", {
              headers: { Authorization: `Bearer ${token}` },
            });
            if (!res.ok) {
              const payload = decodeJwtPayload(token);
              currentUserRole = normalizeRole(payload?.role ?? "");
              roleResolved = currentUserRole !== "";
              return;
            }
            const body = await res.json();
            currentUserRole = normalizeRole(
              body?.data?.role ?? body?.data?.Role ?? "",
            );
            roleResolved = currentUserRole !== "";
          } catch (_) {
            const payload = decodeJwtPayload(pickFreshestToken());
            currentUserRole = normalizeRole(payload?.role ?? "");
            roleResolved = currentUserRole !== "";
          }
        }

        loadTujuanOptions().then(async () => {
          await loadCurrentUser();
          applyRoleAccess();
          loadList();
        });
      })();
    </script>
    
  </body>
</html>
