<!doctype html>
<html lang="id">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Indikator Sub Kegiatan - E-Planning RSUD</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link href="/assets/css/app.css" rel="stylesheet" />
  </head>
  <body
    class="bg-soft-pattern"
    data-module-name="Indikator Sub Kegiatan"
    data-api-endpoint="/api/v1/indikator_sub_kegiatan"
  >
    <main class="container py-4">
      <header
        class="mb-4 p-4 card shadow-sm border-0 header-gradient text-white"
      >
        <h1 class="h3 mb-1" id="module-title">CRUD</h1>
        <p class="mb-0 opacity-75">
          Kelola data Indikator Sub Kegiatan secara terpisah
        </p>
      </header>

      <div class="row g-4">
        <section class="col-lg-4" aria-label="Form Indikator Sub Kegiatan">
          <div class="card border-0 shadow-sm">
            <div class="card-body">
              <h2 class="h6 text-uppercase text-muted">Form Data</h2>
              <form id="crud-form" class="vstack gap-2" autocomplete="off">
                <input type="hidden" id="entity-id" />

                <label class="form-label mb-0" for="subKegiatanId"
                  >Sub Kegiatan</label
                >
                <select id="subKegiatanId" class="form-select" required>
                  <option value="">Pilih sub kegiatan</option>
                </select>

                <label class="form-label mb-0" for="kode">Kode</label>
                <input
                  id="kode"
                  class="form-control"
                  placeholder="ISK-001"
                  required
                />

                <label class="form-label mb-0" for="nama">Nama</label>
                <input
                  id="nama"
                  class="form-control"
                  placeholder="Nama indikator sub kegiatan"
                  required
                />

                <label class="form-label mb-0" for="formula">Formula</label>
                <textarea
                  id="formula"
                  class="form-control"
                  rows="3"
                  placeholder="Contoh: (jumlah capaian / jumlah target) x 100"
                ></textarea>

                <label class="form-label mb-0" for="satuan">Satuan</label>
                <input id="satuan" class="form-control" placeholder="%" />

                <label class="form-label mb-0" for="baseline">Baseline</label>
                <input
                  id="baseline"
                  type="number"
                  step="0.01"
                  class="form-control"
                  value="0"
                />

                <label class="form-label mb-0" for="anggaranN1"
                  >Anggaran Tahun Sebelumnya (N-1)</label
                >
                <input
                  id="anggaranN1"
                  type="number"
                  step="0.01"
                  class="form-control"
                  value="0"
                />

                <label class="form-label mb-0" for="anggaranN"
                  >Jumlah Anggaran Tahun Ini</label
                >
                <input
                  id="anggaranN"
                  type="number"
                  step="0.01"
                  class="form-control"
                  value="0"
                />

                <div class="d-flex gap-2 mt-2">
                  <button type="submit" class="btn btn-primary">Simpan</button>
                  <button
                    type="button"
                    id="btn-reset"
                    class="btn btn-outline-secondary"
                  >
                    Reset
                  </button>
                </div>
                <small id="status-text" class="text-muted" aria-live="polite"
                  >Siap</small
                >
              </form>
            </div>
          </div>
        </section>

        <section class="col-lg-8" aria-label="Daftar Indikator Sub Kegiatan">
          <div class="card border-0 shadow-sm">
            <div class="card-body">
              <div
                class="d-flex justify-content-between align-items-center mb-3"
              >
                <h2 class="h6 text-uppercase text-muted mb-0">Daftar Data</h2>
                <a href="/ui/dashboard" class="btn btn-sm btn-outline-dark"
                  >Kembali ke Dashboard</a
                >
              </div>

              <div class="row g-2 mb-3">
                <div class="col-md-8">
                  <input
                    id="query"
                    class="form-control"
                    placeholder="Cari nama atau kode"
                    aria-label="Cari nama atau kode"
                  />
                </div>
                <div class="col-md-4 d-grid">
                  <button
                    id="btn-search"
                    type="button"
                    class="btn btn-outline-primary"
                  >
                    Cari / Refresh
                  </button>
                </div>
              </div>
              <div class="table-responsive">
                <table class="table table-striped table-hover align-middle">
                  <caption class="visually-hidden">
                    Tabel data Indikator Sub Kegiatan
                  </caption>
                  <thead>
                    <tr>
                      <th scope="col">ID</th>
                      <th scope="col">Sub Kegiatan</th>
                      <th scope="col">Kode</th>
                      <th scope="col">Nama</th>
                      <th scope="col">Formula</th>
                      <th scope="col">Satuan</th>
                      <th scope="col">Baseline</th>
                      <th scope="col">Anggaran N-1</th>
                      <th scope="col">Anggaran N</th>
                      <th scope="col">Aksi</th>
                    </tr>
                  </thead>
                  <tbody id="table-body"></tbody>
                </table>
              </div>
              <div
                class="d-flex justify-content-between align-items-center mt-2"
              >
                <small id="meta-text" class="text-muted">Total 0 data</small>
              </div>
            </div>
          </div>
        </section>
      </div>
    </main>

    <script>
      (() => {
        const endpoint = document.body.dataset.apiEndpoint;
        const subKegiatanEndpoint = "/api/v1/sub_kegiatan";

        const form = document.getElementById("crud-form");
        const idInput = document.getElementById("entity-id");
        const subKegiatanIdInput = document.getElementById("subKegiatanId");
        const kodeInput = document.getElementById("kode");
        const namaInput = document.getElementById("nama");
        const formulaInput = document.getElementById("formula");
        const satuanInput = document.getElementById("satuan");
        const baselineInput = document.getElementById("baseline");
        const anggaranN1Input = document.getElementById("anggaranN1");
        const anggaranNInput = document.getElementById("anggaranN");
        const statusText = document.getElementById("status-text");
        const queryInput = document.getElementById("query");
        const btnSearch = document.getElementById("btn-search");
        const btnReset = document.getElementById("btn-reset");
        const tableBody = document.getElementById("table-body");
        const metaText = document.getElementById("meta-text");

        const subKegiatanMap = new Map();

        function authHeader() {
          const token =
            localStorage.getItem("AUTH_TOKEN") ||
            localStorage.getItem("authToken") ||
            "";
          return token ? { Authorization: `Bearer ${token}` } : {};
        }

        function setStatus(message, isError = false) {
          statusText.textContent = message;
          statusText.className = isError
            ? "text-danger small"
            : "text-success small";
        }

        function normalizeSubKegiatan(raw) {
          return {
            id: Number(raw.id ?? raw.ID ?? 0),
            kode: raw.kode ?? raw.Kode ?? "",
            nama: raw.nama ?? raw.Nama ?? "",
          };
        }

        function normalizeItem(raw) {
          return {
            id: Number(raw.id ?? raw.ID ?? 0),
            subKegiatanId: Number(
              raw.sub_kegiatan_id ?? raw.SubKegiatanID ?? 0,
            ),
            kode: raw.kode ?? raw.Kode ?? "",
            nama: raw.nama ?? raw.Nama ?? "",
            formula: raw.formula ?? raw.Formula ?? "",
            satuan: raw.satuan ?? raw.Satuan ?? "",
            baseline: Number(raw.baseline ?? raw.Baseline ?? 0),
            anggaranN1: Number(
              raw.anggaran_tahun_sebelumnya ?? raw.AnggaranN1 ?? 0,
            ),
            anggaranN: Number(raw.anggaran_tahun_ini ?? raw.AnggaranN ?? 0),
          };
        }

        async function fetchJSON(url, options = {}) {
          const res = await fetch(url, {
            ...options,
            headers: {
              ...(options.headers || {}),
              ...authHeader(),
            },
          });

          const body = await res.json();
          if (!res.ok || !body.success) {
            throw new Error(body.error || `HTTP ${res.status}`);
          }

          return body.data;
        }

        function resetForm() {
          idInput.value = "";
          subKegiatanIdInput.value = "";
          kodeInput.value = "";
          namaInput.value = "";
          formulaInput.value = "";
          satuanInput.value = "";
          baselineInput.value = "0";
          anggaranN1Input.value = "0";
          anggaranNInput.value = "0";
        }

        function subKegiatanLabel(subKegiatanId) {
          return (
            subKegiatanMap.get(Number(subKegiatanId)) ||
            `Sub Kegiatan #${subKegiatanId}`
          );
        }

        function rowTemplate(item) {
          const tr = document.createElement("tr");
          tr.innerHTML = `
            <td>${item.id}</td>
            <td>${subKegiatanLabel(item.subKegiatanId)}</td>
            <td>${item.kode}</td>
            <td>${item.nama}</td>
            <td>${item.formula || "-"}</td>
            <td>${item.satuan || "-"}</td>
            <td>${item.baseline.toFixed(2)}</td>
            <td>${item.anggaranN1.toFixed(2)}</td>
            <td>${item.anggaranN.toFixed(2)}</td>
            <td class="text-nowrap">
              <button class="btn btn-sm btn-outline-primary me-1" data-action="edit">Edit</button>
              <button class="btn btn-sm btn-outline-danger" data-action="delete">Hapus</button>
            </td>
          `;

          tr.querySelector('[data-action="edit"]').addEventListener(
            "click",
            () => {
              idInput.value = item.id;
              subKegiatanIdInput.value = String(item.subKegiatanId);
              kodeInput.value = item.kode;
              namaInput.value = item.nama;
              formulaInput.value = item.formula;
              satuanInput.value = item.satuan;
              baselineInput.value = String(item.baseline);
              anggaranN1Input.value = String(item.anggaranN1);
              anggaranNInput.value = String(item.anggaranN);
              setStatus(`Mode edit ID ${item.id}`);
            },
          );

          tr.querySelector('[data-action="delete"]').addEventListener(
            "click",
            async () => {
              if (!confirm(`Hapus indikator sub kegiatan ${item.nama}?`)) {
                return;
              }

              try {
                await fetchJSON(`${endpoint}/${item.id}`, { method: "DELETE" });
                setStatus("Data berhasil dihapus");
                if (Number(idInput.value) === item.id) {
                  resetForm();
                }
                await loadList();
              } catch (error) {
                setStatus(error.message, true);
              }
            },
          );

          return tr;
        }

        async function loadSubKegiatanOptions() {
          try {
            const data = await fetchJSON(subKegiatanEndpoint);
            const items = (Array.isArray(data?.items) ? data.items : [])
              .map(normalizeSubKegiatan)
              .sort((a, b) => a.id - b.id);

            subKegiatanMap.clear();
            subKegiatanIdInput.innerHTML =
              '<option value="">Pilih sub kegiatan</option>';

            items.forEach((item) => {
              const label = `${item.kode} - ${item.nama}`;
              subKegiatanMap.set(item.id, label);

              const option = document.createElement("option");
              option.value = String(item.id);
              option.textContent = label;
              subKegiatanIdInput.appendChild(option);
            });
          } catch (error) {
            setStatus(
              `Pilihan sub kegiatan tidak ditemukan: ${error.message}`,
              true,
            );
          }
        }

        async function loadList() {
          tableBody.innerHTML =
            '<tr><td colspan="10" class="text-center text-muted py-4">Memuat...</td></tr>';

          try {
            const params = new URLSearchParams();
            const q = queryInput.value.trim();
            if (q) {
              params.set("q", q);
            }

            const url = params.size
              ? `${endpoint}?${params.toString()}`
              : endpoint;
            const data = await fetchJSON(url);
            const items = (Array.isArray(data?.items) ? data.items : []).map(
              normalizeItem,
            );

            tableBody.innerHTML = "";
            metaText.textContent = `Total ${items.length} data`;

            if (items.length === 0) {
              tableBody.innerHTML =
                '<tr><td colspan="10" class="text-center text-muted py-4">Belum ada data</td></tr>';
              return;
            }

            items
              .sort((a, b) => a.id - b.id)
              .forEach((item) => tableBody.appendChild(rowTemplate(item)));
          } catch (error) {
            tableBody.innerHTML =
              '<tr><td colspan="10" class="text-center text-danger py-4">Gagal memuat data</td></tr>';
            setStatus(error.message, true);
          }
        }

        form.addEventListener("submit", async (event) => {
          event.preventDefault();

          const payload = {
            sub_kegiatan_id: Number(subKegiatanIdInput.value),
            kode: kodeInput.value.trim(),
            nama: namaInput.value.trim(),
            formula: formulaInput.value.trim(),
            satuan: satuanInput.value.trim(),
            baseline: Number(baselineInput.value || 0),
            anggaran_tahun_sebelumnya: Number(anggaranN1Input.value || 0),
            anggaran_tahun_ini: Number(anggaranNInput.value || 0),
          };

          const id = idInput.value.trim();
          const isEdit = id !== "";
          const url = isEdit ? `${endpoint}/${id}` : endpoint;
          const method = isEdit ? "PUT" : "POST";

          try {
            await fetchJSON(url, {
              method,
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify(payload),
            });

            setStatus(
              isEdit
                ? `Data ID ${id} diperbarui`
                : "Data baru berhasil disimpan",
            );
            resetForm();
            await loadList();
          } catch (error) {
            setStatus(error.message, true);
          }
        });

        btnReset.addEventListener("click", () => {
          resetForm();
          setStatus("Form direset");
        });

        btnSearch.addEventListener("click", () => {
          loadList();
        });

        loadSubKegiatanOptions();
        loadList();
      })();
    </script>
  </body>
</html>
