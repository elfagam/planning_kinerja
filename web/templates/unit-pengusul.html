<!doctype html>
<html lang="id">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Unit Pengusul - E-Planning RSUD</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link href="/assets/css/app.css" rel="stylesheet" />
    <script src="/assets/js/auth-client.js?v=20260326"></script>
    
  </head>
  <body
    class="bg-soft-pattern"
    data-module-name="Unit Pengusul"
    data-api-endpoint="/api/v1/unit_pengusul"
  >
    <main class="container py-4">
      <header
        class="mb-4 p-4 card shadow-sm border-0 header-gradient text-white"
      >
        <h1 class="h3 mb-1">CRUD</h1>
        <p class="mb-0 opacity-75">Kelola data Unit Pengusul</p>
      </header>

      <div class="row g-4">
        <section class="col-lg-4" aria-label="Form Unit Pengusul">
          <div class="card border-0 shadow-sm">
            <div class="card-body">
              <h2 class="h6 text-uppercase text-muted">Form Data</h2>
              <form id="crud-form" class="vstack gap-2" autocomplete="off">
                <input type="hidden" id="entity-id" />

                <label class="form-label mb-0" for="kode">Kode</label>
                <input
                  id="kode"
                  class="form-control"
                  placeholder="UP-001"
                  required
                />

                <label class="form-label mb-0" for="nama">Nama</label>
                <input
                  id="nama"
                  class="form-control"
                  placeholder="Nama unit pengusul"
                  required
                />

                <label class="form-label mb-0" for="namaPenanggungjawab"
                  >Nama Penanggung Jawab</label
                >
                <input
                  id="namaPenanggungjawab"
                  class="form-control"
                  placeholder="Nama lengkap penanggung jawab"
                />

                <label class="form-label mb-0" for="nipPenanggungjawab"
                  >NIP Penanggung Jawab</label
                >
                <input
                  id="nipPenanggungjawab"
                  class="form-control"
                  placeholder="NIP"
                />

                <label class="form-label mb-0" for="jabatanPenanggungjawab"
                  >Jabatan Penanggung Jawab</label
                >
                <input
                  id="jabatanPenanggungjawab"
                  class="form-control"
                  placeholder="Jabatan"
                />

                <label class="form-label mb-0" for="keterangan"
                  >Keterangan</label
                >
                <textarea
                  id="keterangan"
                  class="form-control"
                  rows="3"
                  placeholder="Keterangan tambahan"
                ></textarea>

                <div class="form-check mt-1">
                  <input
                    id="aktif"
                    class="form-check-input"
                    type="checkbox"
                    checked
                  />
                  <label class="form-check-label" for="aktif">Aktif</label>
                </div>

                <div class="d-flex gap-2 mt-2">
                  <button type="submit" class="btn btn-primary">Simpan</button>
                  <button
                    type="button"
                    id="btn-reset"
                    class="btn btn-outline-secondary"
                  >
                    Reset
                  </button>
                </div>
                <small id="status-text" class="text-muted" aria-live="polite"
                  >Siap</small
                >
              </form>
            </div>
          </div>
        </section>

        <section class="col-lg-8" aria-label="Daftar Unit Pengusul">
          <div class="card border-0 shadow-sm">
            <div class="card-body">
              <div
                class="d-flex justify-content-between align-items-center mb-3"
              >
                <h2 class="h6 text-uppercase text-muted mb-0">Daftar Data</h2>
                <a href="/ui/dashboard" class="btn btn-sm btn-outline-dark"
                  >Kembali ke Dashboard</a
                >
              </div>

              <div class="row g-2 mb-3">
                <div class="col-md-8">
                  <input
                    id="query"
                    class="form-control"
                    placeholder="Cari kode atau nama"
                    aria-label="Cari kode atau nama"
                  />
                </div>
                <div class="col-md-4 d-grid">
                  <button
                    id="btn-search"
                    type="button"
                    class="btn btn-outline-primary"
                  >
                    Cari / Refresh
                  </button>
                </div>
              </div>

              <div class="table-responsive">
                <table class="table table-striped table-hover align-middle">
                  <caption class="visually-hidden">
                    Tabel data Unit Pengusul
                  </caption>
                  <thead>
                    <tr>
                      <th scope="col">ID</th>
                      <th scope="col">Kode</th>
                      <th scope="col">Nama</th>
                      <th scope="col">Penanggung Jawab</th>
                      <th scope="col">NIP</th>
                      <th scope="col">Jabatan</th>
                      <th scope="col">Keterangan</th>
                      <th scope="col">Aktif</th>
                      <th scope="col">Aksi</th>
                    </tr>
                  </thead>
                  <tbody id="table-body"></tbody>
                </table>
              </div>

              <div
                class="d-flex justify-content-between align-items-center mt-2"
              >
                <small id="meta-text" class="text-muted">Total 0 data</small>
              </div>
            </div>
          </div>
        </section>
      </div>
    </main>

    <script>
      (() => {
        const endpoint = document.body.dataset.apiEndpoint;

        const form = document.getElementById("crud-form");
        const idInput = document.getElementById("entity-id");
        const kodeInput = document.getElementById("kode");
        const namaInput = document.getElementById("nama");
        const namaPenanggungjawabInput = document.getElementById(
          "namaPenanggungjawab",
        );
        const nipPenanggungjawabInput =
          document.getElementById("nipPenanggungjawab");
        const jabatanPenanggungjawabInput = document.getElementById(
          "jabatanPenanggungjawab",
        );
        const keteranganInput = document.getElementById("keterangan");
        const aktifInput = document.getElementById("aktif");
        const statusText = document.getElementById("status-text");
        const queryInput = document.getElementById("query");
        const btnSearch = document.getElementById("btn-search");
        const btnReset = document.getElementById("btn-reset");
        const tableBody = document.getElementById("table-body");
        const metaText = document.getElementById("meta-text");

        function getAccessToken() {
          return (
            localStorage.getItem("AUTH_TOKEN") ||
            localStorage.getItem("authToken") ||
            ""
          );
        }

        function redirectToLogin() {
          const next = encodeURIComponent(
            window.location.pathname + window.location.search,
          );
          window.location.href = `/ui/login?next=${next}`;
        }

        const MUTATION_ROLES = new Set(["ADMIN", "PERENCANA", "OPERATOR"]);
        let currentUserRole = "";

        function normalizeRole(raw) {
          return String(raw || "").trim().toUpperCase();
        }

        function canMutateByRole(role) {
          return MUTATION_ROLES.has(normalizeRole(role));
        }

        function applyRoleAccess() {
          if (canMutateByRole(currentUserRole)) return;
          form.querySelectorAll("input, textarea, select, button[type='submit']").forEach((el) => {
            el.disabled = true;
          });
          const info = document.createElement("p");
          info.className = "text-warning small mt-2 mb-0";
          info.textContent = "Mode baca saja — role Anda tidak memiliki hak untuk mengubah data.";
          form.appendChild(info);
        }
        function authHeader() {
          const token = getAccessToken();
          return token ? { Authorization: `Bearer ${token}` } : {};
        }

        function setStatus(message, isError = false) {
          statusText.textContent = message;
          statusText.className = isError
            ? "text-danger small"
            : "text-success small";
        }

        function normalizeItem(raw) {
          return {
            id: Number(raw.id ?? raw.ID ?? 0),
            kode: raw.kode ?? raw.Kode ?? "",
            nama: raw.nama ?? raw.Nama ?? "",
            namaPenanggungjawab:
              raw.nama_penanggungjawab ?? raw.NamaPenanggungjawab ?? "",
            nipPenanggungjawab:
              raw.nip_penanggungjawab ?? raw.NipPenanggungjawab ?? "",
            jabatanPenanggungjawab:
              raw.jabatan_penanggungjawab ?? raw.JabatanPenanggungjawab ?? "",
            keterangan: raw.keterangan ?? raw.Keterangan ?? "",
            aktif: Boolean(raw.aktif ?? raw.Aktif ?? false),
          };
        }


        function resetForm() {
          idInput.value = "";
          kodeInput.value = "";
          namaInput.value = "";
          namaPenanggungjawabInput.value = "";
          nipPenanggungjawabInput.value = "";
          jabatanPenanggungjawabInput.value = "";
          keteranganInput.value = "";
          aktifInput.checked = true;
        }

        function rowTemplate(item) {
          const tr = document.createElement("tr");
          tr.innerHTML = `
            <td>${item.id}</td>
            <td>${item.kode}</td>
            <td>${item.nama}</td>
            <td>${item.namaPenanggungjawab || "-"}</td>
            <td>${item.nipPenanggungjawab || "-"}</td>
            <td>${item.jabatanPenanggungjawab || "-"}</td>
            <td>${item.keterangan || "-"}</td>
            <td>
              <span class="badge ${item.aktif ? "text-bg-success" : "text-bg-secondary"}">
                ${item.aktif ? "Aktif" : "Nonaktif"}
              </span>
            </td>
            <td class="text-nowrap">
              ${canMutateByRole(currentUserRole) ? '<button class="btn btn-sm btn-outline-primary me-1" data-action="edit">Edit</button><button class="btn btn-sm btn-outline-danger" data-action="delete">Hapus</button>' : '<span class="text-muted small">Read-only</span>'}
            </td>
          `;

          tr.querySelector('[data-action="edit"]')?.addEventListener(
            "click",
            () => {
              idInput.value = item.id;
              kodeInput.value = item.kode;
              namaInput.value = item.nama;
              namaPenanggungjawabInput.value = item.namaPenanggungjawab || "";
              nipPenanggungjawabInput.value = item.nipPenanggungjawab || "";
              jabatanPenanggungjawabInput.value =
                item.jabatanPenanggungjawab || "";
              keteranganInput.value = item.keterangan || "";
              aktifInput.checked = item.aktif;
              setStatus(`Mode edit ID ${item.id}`);
            },
          );

          tr.querySelector('[data-action="delete"]')?.addEventListener(
            "click",
            async () => {
              if (!confirm(`Hapus unit pengusul ${item.nama}?`)) {
                return;
              }

              try {
                await fetchJSON(`${endpoint}/${item.id}`, { method: "DELETE" });
                setStatus("Data berhasil dihapus");
                if (Number(idInput.value) === item.id) {
                  resetForm();
                }
                await loadList();
              } catch (error) {
                setStatus(error.message, true);
              }
            },
          );

          return tr;
        }

        async function loadList() {
          tableBody.innerHTML =
            '<tr><td colspan="9" class="text-center text-muted py-4">Memuat...</td></tr>';

          try {
            const params = new URLSearchParams();
            const q = queryInput.value.trim();
            if (q) {
              params.set("q", q);
            }

            const url = params.size
              ? `${endpoint}?${params.toString()}`
              : endpoint;
            const data = await fetchJSON(url);
            const items = (Array.isArray(data?.items) ? data.items : []).map(
              normalizeItem,
            );

            tableBody.innerHTML = "";
            metaText.textContent = `Total ${items.length} data`;

            if (items.length === 0) {
              tableBody.innerHTML =
                '<tr><td colspan="9" class="text-center text-muted py-4">Belum ada data</td></tr>';
              return;
            }

            items
              .sort((a, b) => a.id - b.id)
              .forEach((item) => tableBody.appendChild(rowTemplate(item)));
          } catch (error) {
            tableBody.innerHTML =
              '<tr><td colspan="9" class="text-center text-danger py-4">Gagal memuat data</td></tr>';
            setStatus(error.message, true);
          }
        }

        form.addEventListener("submit", async (event) => {
          event.preventDefault();

          if (!canMutateByRole(currentUserRole)) {
            setStatus("Anda tidak memiliki hak akses untuk menyimpan perubahan", true);
            return;
          }

          const payload = {
            kode: kodeInput.value.trim(),
            nama: namaInput.value.trim(),
            nama_penanggungjawab: namaPenanggungjawabInput.value.trim(),
            nip_penanggungjawab: nipPenanggungjawabInput.value.trim(),
            jabatan_penanggungjawab: jabatanPenanggungjawabInput.value.trim(),
            keterangan: keteranganInput.value.trim(),
            aktif: Boolean(aktifInput.checked),
          };

          const id = idInput.value.trim();
          const isEdit = id !== "";
          const url = isEdit ? `${endpoint}/${id}` : endpoint;
          const method = isEdit ? "PUT" : "POST";

          try {
            await fetchJSON(url, {
              method,
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify(payload),
            });

            setStatus(
              isEdit
                ? `Data ID ${id} diperbarui`
                : "Data baru berhasil disimpan",
            );
            resetForm();
            await loadList();
          } catch (error) {
            setStatus(error.message, true);
          }
        });

        btnReset.addEventListener("click", () => {
          resetForm();
          setStatus("Form direset");
        });

        btnSearch.addEventListener("click", () => {
          loadList();
        });

        queryInput.addEventListener("keydown", (event) => {
          if (event.key === "Enter") {
            event.preventDefault();
            loadList();
          }
        });

        if (!getAccessToken()) {
          redirectToLogin();
          return;
        }

        async function loadCurrentUser() {
          try {
            const token =
              localStorage.getItem("AUTH_TOKEN") ||
              localStorage.getItem("authToken") ||
              "";
            if (!token) return;
            const res = await fetch("/api/v1/auth/me", {
              headers: { Authorization: `Bearer ${token}` },
            });
            if (!res.ok) return;
            const body = await res.json();
            currentUserRole = normalizeRole(body?.data?.role ?? "");
          } catch (_) {
            // non-fatal: fallback to read-only
          }
        }

        resetForm();
        loadCurrentUser().then(() => {
          applyRoleAccess();
          loadList();
        });
      })();
    </script>
</body>
</html>
