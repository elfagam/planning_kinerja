<!doctype html>
<html lang="id">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Rencana Kerja - E-Planning RSUD</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link href="/assets/css/app.css" rel="stylesheet" />
  </head>
  <body
    class="bg-soft-pattern"
    data-module-name="Rencana Kerja"
    data-api-endpoint="/api/v1/rencana_kerja"
  >
    <main class="container py-4">
      <header
        class="mb-4 p-4 card shadow-sm border-0 header-gradient text-white"
      >
        <h1 class="h3 mb-1" id="module-title">CRUD</h1>
        <p class="mb-0 opacity-75">Kelola data Rencana Kerja secara terpisah</p>
      </header>

      <div class="row g-4">
        <section class="col-lg-4" aria-label="Form Rencana Kerja">
          <div class="card border-0 shadow-sm">
            <div class="card-body">
              <h2 class="h6 text-uppercase text-muted">Form Data</h2>
              <form id="crud-form" class="vstack gap-2" autocomplete="off">
                <input type="hidden" id="entity-id" />

                <label class="form-label mb-0" for="subKegiatanId"
                  >Sub Kegiatan</label
                >
                <select id="subKegiatanId" class="form-select" required>
                  <option value="">Pilih sub kegiatan</option>
                </select>

                <label class="form-label mb-0" for="indikatorSubKegiatanId"
                  >Indikator Sub Kegiatan</label
                >
                <select
                  id="indikatorSubKegiatanId"
                  class="form-select"
                  required
                >
                  <option value="">Pilih indikator sub kegiatan</option>
                </select>

                <label class="form-label mb-0" for="unitPengusulId"
                  >Unit Pengusul</label
                >
                <select id="unitPengusulId" class="form-select" required>
                  <option value="">Pilih unit pengusul</option>
                </select>

                <label class="form-label mb-0" for="kode">Kode</label>
                <input
                  id="kode"
                  class="form-control"
                  placeholder="RK-001"
                  required
                />

                <label class="form-label mb-0" for="nama">Nama</label>
                <input
                  id="nama"
                  class="form-control"
                  placeholder="Nama rencana kerja"
                  required
                />

                <div class="row g-2">
                  <div class="col-md-6">
                    <label class="form-label mb-0" for="tahun">Tahun</label>
                    <input
                      id="tahun"
                      type="number"
                      class="form-control"
                      min="2000"
                      max="2100"
                      required
                    />
                  </div>
                  <div class="col-md-6">
                    <label class="form-label mb-0" for="triwulan"
                      >Triwulan</label
                    >
                    <select id="triwulan" class="form-select">
                      <option value="">Tahunan</option>
                      <option value="1">1</option>
                      <option value="2">2</option>
                      <option value="3">3</option>
                      <option value="4">4</option>
                    </select>
                  </div>
                </div>

                <div class="row g-2">
                  <div class="col-md-6">
                    <label class="form-label mb-0" for="status">Status</label>
                    <select id="status" class="form-select" required>
                      <option value="DRAFT" selected>DRAFT</option>
                      <option value="DIAJUKAN">DIAJUKAN</option>
                      <option value="DISETUJUI">DISETUJUI</option>
                      <option value="DITOLAK">DITOLAK</option>
                    </select>
                  </div>
                  <div class="col-md-6">
                    <label class="form-label mb-0" for="dibuatOleh"
                      >Dibuat Oleh (ID User)</label
                    >
                    <input
                      id="dibuatOleh"
                      type="number"
                      min="1"
                      class="form-control"
                      required
                    />
                  </div>
                </div>

                <label class="form-label mb-0" for="catatan">Catatan</label>
                <textarea
                  id="catatan"
                  class="form-control"
                  rows="3"
                  placeholder="Catatan tambahan"
                ></textarea>

                <div class="d-flex gap-2 mt-2">
                  <button type="submit" class="btn btn-primary">Simpan</button>
                  <button
                    type="button"
                    id="btn-reset"
                    class="btn btn-outline-secondary"
                  >
                    Reset
                  </button>
                </div>
                <small id="status-text" class="text-muted" aria-live="polite"
                  >Siap</small
                >
              </form>
            </div>
          </div>
        </section>

        <section class="col-lg-8" aria-label="Daftar Rencana Kerja">
          <div class="card border-0 shadow-sm">
            <div class="card-body">
              <div
                class="d-flex justify-content-between align-items-center mb-3"
              >
                <h2 class="h6 text-uppercase text-muted mb-0">Daftar Data</h2>
                <a href="/ui/dashboard" class="btn btn-sm btn-outline-dark"
                  >Kembali ke Dashboard</a
                >
              </div>

              <div class="row g-2 mb-3">
                <div class="col-md-8">
                  <input
                    id="query"
                    class="form-control"
                    placeholder="Cari nama atau kode"
                    aria-label="Cari nama atau kode"
                  />
                </div>
                <div class="col-md-4 d-grid">
                  <button
                    id="btn-search"
                    type="button"
                    class="btn btn-outline-primary"
                  >
                    Cari / Refresh
                  </button>
                </div>
              </div>

              <div class="table-responsive">
                <table class="table table-striped table-hover align-middle">
                  <caption class="visually-hidden">
                    Tabel data Rencana Kerja
                  </caption>
                  <thead>
                    <tr>
                      <th scope="col">ID</th>
                      <th scope="col">Indikator Sub Kegiatan</th>
                      <th scope="col">Kode</th>
                      <th scope="col">Nama</th>
                      <th scope="col">Tahun</th>
                      <th scope="col">Triwulan</th>
                      <th scope="col">Unit Pengusul</th>
                      <th scope="col">Status</th>
                      <th scope="col">Aksi</th>
                    </tr>
                  </thead>
                  <tbody id="table-body"></tbody>
                </table>
              </div>

              <div
                class="d-flex justify-content-between align-items-center mt-2"
              >
                <small id="meta-text" class="text-muted">Total 0 data</small>
              </div>
            </div>
          </div>
        </section>
      </div>
    </main>

    <script>
      (() => {
        const endpoint = document.body.dataset.apiEndpoint;
        const subKegiatanEndpoint = "/api/v1/sub_kegiatan";
        const indikatorEndpoint = "/api/v1/indikator_sub_kegiatan";
        const unitPengusulEndpoint = "/api/v1/unit_pengusul";

        const form = document.getElementById("crud-form");
        const idInput = document.getElementById("entity-id");
        const subKegiatanInput = document.getElementById("subKegiatanId");
        const indikatorInput = document.getElementById(
          "indikatorSubKegiatanId",
        );
        const unitPengusulInput = document.getElementById("unitPengusulId");
        const kodeInput = document.getElementById("kode");
        const namaInput = document.getElementById("nama");
        const tahunInput = document.getElementById("tahun");
        const triwulanInput = document.getElementById("triwulan");
        const statusInput = document.getElementById("status");
        const dibuatOlehInput = document.getElementById("dibuatOleh");
        const catatanInput = document.getElementById("catatan");
        const statusText = document.getElementById("status-text");
        const queryInput = document.getElementById("query");
        const btnSearch = document.getElementById("btn-search");
        const btnReset = document.getElementById("btn-reset");
        const tableBody = document.getElementById("table-body");
        const metaText = document.getElementById("meta-text");

        const subKegiatanMap = new Map();
        const indikatorMap = new Map();
        const indikatorDetailMap = new Map();
        const unitPengusulMap = new Map();
        let indikatorItemsCache = [];

        function authHeader() {
          const token =
            localStorage.getItem("AUTH_TOKEN") ||
            localStorage.getItem("authToken") ||
            "";
          return token ? { Authorization: `Bearer ${token}` } : {};
        }

        function setStatus(message, isError = false) {
          statusText.textContent = message;
          statusText.className = isError
            ? "text-danger small"
            : "text-success small";
        }

        function normalizeSubKegiatan(raw) {
          return {
            id: Number(raw.id ?? raw.ID ?? 0),
            kode: raw.kode ?? raw.Kode ?? "",
            nama: raw.nama ?? raw.Nama ?? "",
          };
        }

        function normalizeIndikator(raw) {
          return {
            id: Number(raw.id ?? raw.ID ?? 0),
            subKegiatanId: Number(
              raw.sub_kegiatan_id ?? raw.SubKegiatanID ?? 0,
            ),
            kode: raw.kode ?? raw.Kode ?? "",
            nama: raw.nama ?? raw.Nama ?? "",
          };
        }

        function normalizeUnit(raw) {
          return {
            id: Number(raw.id ?? raw.ID ?? 0),
            kode: raw.kode ?? raw.Kode ?? "",
            nama: raw.nama ?? raw.Nama ?? "",
          };
        }

        function normalizeItem(raw) {
          return {
            id: Number(raw.id ?? raw.ID ?? 0),
            indikatorSubKegiatanId: Number(
              raw.indikator_sub_kegiatan_id ?? raw.IndikatorSubKegiatanID ?? 0,
            ),
            unitPengusulId: Number(
              raw.unit_pengusul_id ?? raw.UnitPengusulID ?? 0,
            ),
            kode: raw.kode ?? raw.Kode ?? "",
            nama: raw.nama ?? raw.Nama ?? "",
            tahun: Number(raw.tahun ?? raw.Tahun ?? 0),
            triwulan: raw.triwulan ?? raw.Triwulan ?? null,
            status: raw.status ?? raw.Status ?? "DRAFT",
            dibuatOleh: Number(raw.dibuat_oleh ?? raw.DibuatOleh ?? 0),
            catatan: raw.catatan ?? raw.Catatan ?? "",
          };
        }

        async function fetchJSON(url, options = {}) {
          const res = await fetch(url, {
            ...options,
            headers: {
              ...(options.headers || {}),
              ...authHeader(),
            },
          });

          const body = await res.json();
          if (!res.ok || !body.success) {
            throw new Error(body.error || `HTTP ${res.status}`);
          }
          return body.data;
        }

        function resetForm() {
          idInput.value = "";
          subKegiatanInput.value = "";
          indikatorInput.value = "";
          unitPengusulInput.value = "";
          kodeInput.value = "";
          namaInput.value = "";
          tahunInput.value = String(new Date().getFullYear());
          triwulanInput.value = "";
          statusInput.value = "DRAFT";
          dibuatOlehInput.value = "";
          catatanInput.value = "";
          applyIndikatorFilter("", "");
        }

        function indikatorLabel(id) {
          return indikatorMap.get(Number(id)) || `Indikator #${id}`;
        }

        function unitPengusulLabel(id) {
          return unitPengusulMap.get(Number(id)) || `Unit #${id}`;
        }

        function rowTemplate(item) {
          const tr = document.createElement("tr");
          tr.innerHTML = `
            <td>${item.id}</td>
            <td>${indikatorLabel(item.indikatorSubKegiatanId)}</td>
            <td>${item.kode}</td>
            <td>${item.nama}</td>
            <td>${item.tahun || "-"}</td>
            <td>${item.triwulan || "Tahunan"}</td>
            <td>${unitPengusulLabel(item.unitPengusulId)}</td>
            <td><span class="badge text-bg-secondary">${item.status}</span></td>
            <td class="text-nowrap">
              <button class="btn btn-sm btn-outline-primary me-1" data-action="edit">Edit</button>
              <button class="btn btn-sm btn-outline-danger" data-action="delete">Hapus</button>
            </td>
          `;

          tr.querySelector('[data-action="edit"]').addEventListener(
            "click",
            () => {
              idInput.value = item.id;
              const indikatorItem = indikatorDetailMap.get(
                item.indikatorSubKegiatanId,
              );
              const subKegiatanId = indikatorItem?.subKegiatanId ?? 0;
              subKegiatanInput.value = subKegiatanId
                ? String(subKegiatanId)
                : "";
              applyIndikatorFilter(
                subKegiatanInput.value,
                item.indikatorSubKegiatanId,
              );
              unitPengusulInput.value = String(item.unitPengusulId);
              kodeInput.value = item.kode;
              namaInput.value = item.nama;
              tahunInput.value = String(item.tahun || "");
              triwulanInput.value =
                item.triwulan == null ? "" : String(item.triwulan);
              statusInput.value = item.status;
              dibuatOlehInput.value = String(item.dibuatOleh || "");
              catatanInput.value = item.catatan || "";
              setStatus(`Mode edit ID ${item.id}`);
            },
          );

          tr.querySelector('[data-action="delete"]').addEventListener(
            "click",
            async () => {
              if (!confirm(`Hapus rencana kerja ${item.nama}?`)) {
                return;
              }
              try {
                await fetchJSON(`${endpoint}/${item.id}`, { method: "DELETE" });
                setStatus("Data berhasil dihapus");
                if (Number(idInput.value) === item.id) {
                  resetForm();
                }
                await loadList();
              } catch (error) {
                setStatus(error.message, true);
              }
            },
          );

          return tr;
        }

        function fillSelect(selectEl, map, items, defaultText) {
          selectEl.innerHTML = `<option value="">${defaultText}</option>`;
          map.clear();
          items.forEach((item) => {
            const label = `${item.kode} - ${item.nama}`;
            map.set(item.id, label);
            const option = document.createElement("option");
            option.value = String(item.id);
            option.textContent = label;
            selectEl.appendChild(option);
          });
        }

        function applyIndikatorFilter(subKegiatanId, selectedIndikatorId = "") {
          indikatorInput.innerHTML =
            '<option value="">Pilih indikator sub kegiatan</option>';
          indikatorMap.clear();

          const selectedSubIDNum = Number(subKegiatanId || 0);
          const selectedIndikatorIDNum = Number(selectedIndikatorId || 0);

          const visibleItems = indikatorItemsCache.filter((item) => {
            if (!selectedSubIDNum) {
              return true;
            }
            return item.subKegiatanId === selectedSubIDNum;
          });

          visibleItems.forEach((item) => {
            const label = `${item.kode} - ${item.nama}`;
            indikatorMap.set(item.id, label);
            indikatorDetailMap.set(item.id, item);

            const option = document.createElement("option");
            option.value = String(item.id);
            option.textContent = label;
            indikatorInput.appendChild(option);
          });

          if (
            selectedIndikatorIDNum > 0 &&
            visibleItems.some((item) => item.id === selectedIndikatorIDNum)
          ) {
            indikatorInput.value = String(selectedIndikatorIDNum);
            return;
          }

          indikatorInput.value = "";
        }

        async function loadReferenceOptions() {
          try {
            const [subKegiatanData, indikatorData, unitData] =
              await Promise.all([
                fetchJSON(subKegiatanEndpoint),
                fetchJSON(indikatorEndpoint),
                fetchJSON(unitPengusulEndpoint),
              ]);

            const subKegiatanItems = (
              Array.isArray(subKegiatanData?.items) ? subKegiatanData.items : []
            )
              .map(normalizeSubKegiatan)
              .sort((a, b) => a.id - b.id);
            const indikatorItems = (
              Array.isArray(indikatorData?.items) ? indikatorData.items : []
            )
              .map(normalizeIndikator)
              .sort((a, b) => a.id - b.id);
            const unitItems = (
              Array.isArray(unitData?.items) ? unitData.items : []
            )
              .map(normalizeUnit)
              .sort((a, b) => a.id - b.id);

            fillSelect(
              subKegiatanInput,
              subKegiatanMap,
              subKegiatanItems,
              "Pilih sub kegiatan",
            );
            indikatorItemsCache = indikatorItems;
            applyIndikatorFilter("", "");
            fillSelect(
              unitPengusulInput,
              unitPengusulMap,
              unitItems,
              "Pilih unit pengusul",
            );
          } catch (error) {
            setStatus(`Gagal memuat data referensi: ${error.message}`, true);
          }
        }

        async function loadList() {
          tableBody.innerHTML =
            '<tr><td colspan="9" class="text-center text-muted py-4">Memuat...</td></tr>';
          try {
            const params = new URLSearchParams();
            const q = queryInput.value.trim();
            if (q) {
              params.set("q", q);
            }

            const url = params.size
              ? `${endpoint}?${params.toString()}`
              : endpoint;
            const data = await fetchJSON(url);
            const items = (Array.isArray(data?.items) ? data.items : []).map(
              normalizeItem,
            );

            tableBody.innerHTML = "";
            metaText.textContent = `Total ${items.length} data`;

            if (items.length === 0) {
              tableBody.innerHTML =
                '<tr><td colspan="9" class="text-center text-muted py-4">Belum ada data</td></tr>';
              return;
            }

            items
              .sort((a, b) => a.id - b.id)
              .forEach((item) => tableBody.appendChild(rowTemplate(item)));
          } catch (error) {
            tableBody.innerHTML =
              '<tr><td colspan="9" class="text-center text-danger py-4">Gagal memuat data</td></tr>';
            setStatus(error.message, true);
          }
        }

        form.addEventListener("submit", async (event) => {
          event.preventDefault();

          const payload = {
            indikator_sub_kegiatan_id: Number(indikatorInput.value),
            unit_pengusul_id: Number(unitPengusulInput.value),
            kode: kodeInput.value.trim(),
            nama: namaInput.value.trim(),
            tahun: Number(tahunInput.value || 0),
            status: statusInput.value,
            dibuat_oleh: Number(dibuatOlehInput.value || 0),
            catatan: catatanInput.value.trim(),
          };

          const triwulanValue = triwulanInput.value.trim();
          if (triwulanValue !== "") {
            payload.triwulan = Number(triwulanValue);
          }

          if (!subKegiatanInput.value) {
            setStatus("Sub kegiatan wajib dipilih", true);
            return;
          }
          if (!payload.indikator_sub_kegiatan_id) {
            setStatus("Indikator sub kegiatan wajib dipilih", true);
            return;
          }

          const id = idInput.value.trim();
          const isEdit = id !== "";
          const url = isEdit ? `${endpoint}/${id}` : endpoint;
          const method = isEdit ? "PUT" : "POST";

          try {
            await fetchJSON(url, {
              method,
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify(payload),
            });

            setStatus(
              isEdit
                ? `Data ID ${id} diperbarui`
                : "Data baru berhasil disimpan",
            );
            resetForm();
            await loadList();
          } catch (error) {
            setStatus(error.message, true);
          }
        });

        btnReset.addEventListener("click", () => {
          resetForm();
          setStatus("Form direset");
        });

        btnSearch.addEventListener("click", () => {
          loadList();
        });

        subKegiatanInput.addEventListener("change", () => {
          applyIndikatorFilter(subKegiatanInput.value, "");
        });

        resetForm();
        loadReferenceOptions();
        loadList();
      })();
    </script>
  </body>
</html>
