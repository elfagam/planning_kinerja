<!doctype html>
<html lang="id">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Pagu Sub Kegiatan - E-Planning RSUD</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link href="/assets/css/app.css" rel="stylesheet" />
  </head>
  <body
    class="bg-soft-pattern"
    data-module-name="Pagu Sub Kegiatan"
    data-api-endpoint="/api/v1/pagu_sub_kegiatan"
  >
    <main class="container py-4">
      <header
        class="mb-4 p-4 card shadow-sm border-0 header-gradient text-white"
      >
        <h1 class="h3 mb-1">CRUD</h1>
        <p class="mb-0 opacity-75">Kelola pagu per sub kegiatan</p>
      </header>

      <div class="row g-4">
        <section class="col-lg-4" aria-label="Form Pagu Sub Kegiatan">
          <div class="card border-0 shadow-sm">
            <div class="card-body">
              <h2 class="h6 text-uppercase text-muted">Form Data</h2>
              <form id="crud-form" class="vstack gap-2" autocomplete="off">
                <input type="hidden" id="entity-id" />

                <label class="form-label mb-0" for="subKegiatanId"
                  >Sub Kegiatan</label
                >
                <input
                  id="subKegiatanFilter"
                  class="form-control"
                  placeholder="Filter kode atau nama sub kegiatan"
                  aria-label="Filter kode atau nama sub kegiatan"
                />
                <select id="subKegiatanId" class="form-select" required>
                  <option value="">Pilih sub kegiatan</option>
                </select>

                <label class="form-label mb-0" for="tahun">Tahun</label>
                <input
                  id="tahun"
                  name="tahun"
                  required
                  min="2000"
                  max="2100"
                  step="1"
                  placeholder="2026"
                  type="text"
                  class="form-control"
                />

                <label class="form-label mb-0" for="paguTahunSebelumnya"
                  >Pagu Tahun Sebelumnya</label
                >
                <input
                  id="paguTahunSebelumnya"
                  type="number"
                  step="0.01"
                  min="0"
                  class="form-control"
                  value="0"
                  required
                />

                <label class="form-label mb-0" for="paguTahunIni"
                  >Pagu Tahun Ini</label
                >
                <input
                  id="paguTahunIni"
                  type="number"
                  step="0.01"
                  min="0"
                  class="form-control"
                  value="0"
                  required
                />

                <div class="d-flex gap-2 mt-2">
                  <button type="submit" class="btn btn-primary">Simpan</button>
                  <button
                    type="button"
                    id="btn-reset"
                    class="btn btn-outline-secondary"
                  >
                    Reset
                  </button>
                </div>
                <small id="status-text" class="text-muted" aria-live="polite"
                  >Siap</small
                >
              </form>
            </div>
          </div>
        </section>

        <section class="col-lg-8" aria-label="Daftar Pagu Sub Kegiatan">
          <div class="card border-0 shadow-sm">
            <div class="card-body">
              <div
                class="d-flex justify-content-between align-items-center mb-3"
              >
                <h2 class="h6 text-uppercase text-muted mb-0">Daftar Data</h2>
                <a href="/ui/dashboard" class="btn btn-sm btn-outline-dark"
                  >Kembali ke Dashboard</a
                >
              </div>

              <div class="row g-2 mb-3">
                <div class="col-md-6">
                  <input
                    id="query"
                    class="form-control"
                    placeholder="Cari ID, kode, atau nama sub kegiatan"
                    aria-label="Cari ID, kode, atau nama sub kegiatan"
                  />
                </div>
                <div class="col-md-3">
                  <input
                    id="filter-year"
                    type="number"
                    min="2000"
                    max="2100"
                    step="1"
                    class="form-control"
                    placeholder="Filter tahun"
                    aria-label="Filter tahun"
                  />
                </div>
                <div class="col-md-3 d-grid">
                  <button
                    id="btn-search"
                    type="button"
                    class="btn btn-outline-primary"
                  >
                    Cari / Refresh
                  </button>
                </div>
              </div>

              <div class="table-responsive">
                <table class="table table-striped table-hover align-middle">
                  <caption class="visually-hidden">
                    Tabel data pagu sub kegiatan
                  </caption>
                  <thead>
                    <tr>
                      <th scope="col">ID</th>
                      <th scope="col">Sub Kegiatan</th>
                      <th scope="col">Tahun</th>
                      <th scope="col" class="text-end">
                        Pagu Tahun Sebelumnya
                      </th>
                      <th scope="col" class="text-end">Pagu Tahun Ini</th>
                      <th scope="col">Aksi</th>
                    </tr>
                  </thead>
                  <tbody id="table-body"></tbody>
                </table>
              </div>

              <div
                class="d-flex justify-content-between align-items-center mt-2"
              >
                <small id="meta-text" class="text-muted">Total 0 data</small>
              </div>
            </div>
          </div>
        </section>
      </div>
    </main>

    <script>
      (() => {
        const endpoint = document.body.dataset.apiEndpoint;
        const subKegiatanEndpoint = "/api/v1/sub_kegiatan";

        const form = document.getElementById("crud-form");
        const idInput = document.getElementById("entity-id");
        const subKegiatanFilterInput =
          document.getElementById("subKegiatanFilter");
        const subKegiatanIdInput = document.getElementById("subKegiatanId");
        const tahunInput = document.getElementById("tahun");
        const paguTahunSebelumnyaInput = document.getElementById(
          "paguTahunSebelumnya",
        );
        const paguTahunIniInput = document.getElementById("paguTahunIni");
        const statusText = document.getElementById("status-text");
        const queryInput = document.getElementById("query");
        const filterYearInput = document.getElementById("filter-year");
        const btnSearch = document.getElementById("btn-search");
        const btnReset = document.getElementById("btn-reset");
        const tableBody = document.getElementById("table-body");
        const metaText = document.getElementById("meta-text");
        const DEFAULT_YEAR_KEY = "DEFAULT_YEAR";

        const subKegiatanMap = new Map();
        let subKegiatanItemsCache = [];

        function decodeJwtPayload(token) {
          if (!token || token.split(".").length < 2) {
            return null;
          }
          try {
            const base64 = token
              .split(".")[1]
              .replace(/-/g, "+")
              .replace(/_/g, "/");
            const padded =
              base64 + "=".repeat((4 - (base64.length % 4 || 4)) % 4);
            return JSON.parse(atob(padded));
          } catch (_) {
            return null;
          }
        }

        function pickFreshestToken() {
          const keys = ["AUTH_TOKEN", "authToken"];
          let chosen = "";
          let chosenIat = -1;

          keys.forEach((key) => {
            const token = localStorage.getItem(key) || "";
            if (!token) return;
            const payload = decodeJwtPayload(token);
            const iat = Number(payload?.iat || 0);
            if (!chosen || iat > chosenIat) {
              chosen = token;
              chosenIat = iat;
            }
          });

          return chosen;
        }

        function getAccessToken() {
          return pickFreshestToken();
        }

        function redirectToLogin() {
          const next = encodeURIComponent(
            window.location.pathname + window.location.search,
          );
          window.location.href = `/ui/login?next=${next}`;
        }

        const MUTATION_ROLES = new Set(["ADMIN", "PERENCANA", "OPERATOR"]);
        let currentUserRole = "";
        let roleResolved = false;

        function normalizeRole(raw) {
          return String(raw || "")
            .trim()
            .toUpperCase();
        }

        function canMutateByRole(role) {
          return MUTATION_ROLES.has(normalizeRole(role));
        }

        function applyRoleAccess() {
          const controls = form.querySelectorAll(
            "input, textarea, select, button[type='submit']",
          );
          const existingInfo = form.querySelector(
            '[data-role-readonly-msg="1"]',
          );

          if (!roleResolved || canMutateByRole(currentUserRole)) {
            controls.forEach((el) => {
              el.disabled = false;
            });
            if (existingInfo) {
              existingInfo.remove();
            }
            return;
          }

          controls.forEach((el) => {
            el.disabled = true;
          });

          if (!existingInfo) {
            const info = document.createElement("p");
            info.className = "text-warning small mt-2 mb-0";
            info.setAttribute("data-role-readonly-msg", "1");
            info.textContent =
              "Mode baca saja — role Anda tidak memiliki hak untuk mengubah data.";
            form.appendChild(info);
          }
        }
        function authHeader() {
          const token = getAccessToken();
          return token ? { Authorization: `Bearer ${token}` } : {};
        }

        function setStatus(message, isError = false) {
          statusText.textContent = message;
          statusText.className = isError
            ? "text-danger small"
            : "text-success small";
        }

        function normalizeSubKegiatan(raw) {
          return {
            id: Number(raw.id ?? raw.ID ?? 0),
            kode: raw.kode ?? raw.Kode ?? "",
            nama: raw.nama ?? raw.Nama ?? "",
          };
        }

        function normalizeItem(raw) {
          const tahunValue = raw.tahun ?? raw.Tahun ?? null;
          const parsedTahun = Number(tahunValue);
          const subKegiatan = raw.sub_kegiatan ?? raw.SubKegiatan ?? null;
          const subKegiatanKode = subKegiatan?.kode ?? subKegiatan?.Kode ?? "";
          const subKegiatanNama = subKegiatan?.nama ?? subKegiatan?.Nama ?? "";

          return {
            id: Number(raw.id ?? raw.ID ?? 0),
            subKegiatanId: Number(
              raw.sub_kegiatan_id ?? raw.SubKegiatanID ?? 0,
            ),
            subKegiatanLabel:
              subKegiatanKode && subKegiatanNama
                ? `${subKegiatanKode} - ${subKegiatanNama}`
                : "",
            tahun:
              Number.isFinite(parsedTahun) && parsedTahun > 0
                ? parsedTahun
                : null,
            paguTahunSebelumnya: Number(
              raw.pagu_tahun_sebelumnya ?? raw.PaguTahunSebelumnya ?? 0,
            ),
            paguTahunIni: Number(raw.pagu_tahun_ini ?? raw.PaguTahunIni ?? 0),
          };
        }

        function defaultTahun() {
          const stored = String(
            localStorage.getItem(DEFAULT_YEAR_KEY) || "",
          ).trim();
          const year = Number(stored);
          if (Number.isInteger(year) && year >= 2000 && year <= 2100) {
            return String(year);
          }
          return String(new Date().getFullYear());
        }

        function numberFmt(value) {
          return new Intl.NumberFormat("id-ID", {
            minimumFractionDigits: 2,
            maximumFractionDigits: 2,
          }).format(Number(value || 0));
        }


        function fillSelect(selectEl, items, defaultText) {
          selectEl.innerHTML = `<option value="">${defaultText}</option>`;
          items.forEach((item) => {
            const option = document.createElement("option");
            option.value = String(item.id);
            option.textContent = `${item.kode} - ${item.nama}`;
            selectEl.appendChild(option);
          });
        }

        function filterSubKegiatanOptions(filterText = "") {
          const selectedValue = subKegiatanIdInput.value;
          const normalizedFilter = String(filterText || "")
            .trim()
            .toLowerCase();

          let visibleItems = subKegiatanItemsCache;
          if (normalizedFilter) {
            visibleItems = subKegiatanItemsCache.filter((item) => {
              const label = `${item.kode} ${item.nama}`.toLowerCase();
              return label.includes(normalizedFilter);
            });
          }

          fillSelect(subKegiatanIdInput, visibleItems, "Pilih sub kegiatan");

          if (
            selectedValue &&
            visibleItems.some((item) => String(item.id) === selectedValue)
          ) {
            subKegiatanIdInput.value = selectedValue;
            return;
          }

          if (!normalizedFilter) {
            subKegiatanIdInput.value = selectedValue;
          }
        }

        function resetForm() {
          idInput.value = "";
          subKegiatanFilterInput.value = "";
          filterSubKegiatanOptions("");
          subKegiatanIdInput.value = "";
          tahunInput.value = defaultTahun();
          paguTahunSebelumnyaInput.value = "0";
          paguTahunIniInput.value = "0";
        }

        function normalizeYearFilter() {
          const raw = String(filterYearInput.value || "").trim();
          if (!raw) {
            return "";
          }

          const year = Number(raw);
          if (!Number.isInteger(year) || year < 2000 || year > 2100) {
            return "";
          }

          return String(year);
        }

        function subKegiatanLabel(subKegiatanID) {
          return (
            subKegiatanMap.get(Number(subKegiatanID)) ||
            `Sub Kegiatan #${subKegiatanID}`
          );
        }

        function filterListItems(items, queryText) {
          const normalizedQuery = String(queryText || "")
            .trim()
            .toLowerCase();
          if (!normalizedQuery) {
            return items;
          }

          return items.filter((item) => {
            const label = String(
              item.subKegiatanLabel || subKegiatanLabel(item.subKegiatanId),
            ).toLowerCase();
            return (
              String(item.subKegiatanId).includes(normalizedQuery) ||
              String(item.id).includes(normalizedQuery) ||
              label.includes(normalizedQuery)
            );
          });
        }

        async function ensureSubKegiatanReferences(items) {
          const missingIDs = Array.from(
            new Set(
              items
                .map((item) => Number(item.subKegiatanId || 0))
                .filter((id) => id > 0 && !subKegiatanMap.has(id)),
            ),
          );

          if (missingIDs.length === 0) {
            return;
          }

          const recoveredItems = (
            await Promise.all(
              missingIDs.map(async (id) => {
                try {
                  const data = await fetchJSON(`${subKegiatanEndpoint}/${id}`);
                  return normalizeSubKegiatan(data);
                } catch (_) {
                  return null;
                }
              }),
            )
          ).filter((item) => item && item.id > 0);

          if (recoveredItems.length === 0) {
            return;
          }

          const knownIDs = new Set(
            subKegiatanItemsCache.map((item) => item.id),
          );
          recoveredItems.forEach((item) => {
            subKegiatanMap.set(item.id, `${item.kode} - ${item.nama}`);
            if (!knownIDs.has(item.id)) {
              subKegiatanItemsCache.push(item);
              knownIDs.add(item.id);
            }
          });

          subKegiatanItemsCache.sort((a, b) => a.id - b.id);
          filterSubKegiatanOptions(subKegiatanFilterInput.value);
        }

        function rowTemplate(item) {
          const tr = document.createElement("tr");
          tr.innerHTML = `
            <td>${item.id}</td>
            <td>${item.subKegiatanLabel || subKegiatanLabel(item.subKegiatanId)}</td>
            <td>${item.tahun ?? "-"}</td>
            <td class="text-end">${numberFmt(item.paguTahunSebelumnya)}</td>
            <td class="text-end">${numberFmt(item.paguTahunIni)}</td>
            <td class="text-nowrap">
              ${!roleResolved || canMutateByRole(currentUserRole) ? '<button class="btn btn-sm btn-outline-primary me-1" data-action="edit">Edit</button><button class="btn btn-sm btn-outline-danger" data-action="delete">Hapus</button>' : '<span class="text-muted small">Read-only</span>'}
            </td>
          `;

          tr.querySelector('[data-action="edit"]')?.addEventListener(
            "click",
            () => {
              idInput.value = item.id;
              subKegiatanFilterInput.value = "";
              filterSubKegiatanOptions("");
              subKegiatanIdInput.value = String(item.subKegiatanId);
              tahunInput.value = String(item.tahun || defaultTahun());
              paguTahunSebelumnyaInput.value = String(item.paguTahunSebelumnya);
              paguTahunIniInput.value = String(item.paguTahunIni);
              setStatus(`Mode edit ID ${item.id}`);
            },
          );

          tr.querySelector('[data-action="delete"]')?.addEventListener(
            "click",
            async () => {
              if (!confirm(`Hapus data pagu sub kegiatan ID ${item.id}?`)) {
                return;
              }

              try {
                await fetchJSON(`${endpoint}/${item.id}`, { method: "DELETE" });
                setStatus("Data berhasil dihapus");
                if (Number(idInput.value) === item.id) {
                  resetForm();
                }
                await loadList();
              } catch (error) {
                setStatus(error.message, true);
              }
            },
          );

          return tr;
        }

        async function loadSubKegiatanOptions() {
          const data = await fetchJSON(subKegiatanEndpoint);
          const items = (Array.isArray(data?.items) ? data.items : [])
            .map(normalizeSubKegiatan)
            .sort((a, b) => a.id - b.id);

          subKegiatanItemsCache = items;
          subKegiatanMap.clear();
          items.forEach((item) => {
            subKegiatanMap.set(item.id, `${item.kode} - ${item.nama}`);
          });
          fillSelect(subKegiatanIdInput, items, "Pilih sub kegiatan");
        }

        async function loadList() {
          tableBody.innerHTML =
            '<tr><td colspan="6" class="text-center text-muted py-4">Memuat...</td></tr>';

          try {
            const params = new URLSearchParams();
            const q = queryInput.value.trim();

            const tahun = normalizeYearFilter();
            if (tahun) {
              params.set("tahun", tahun);
            }

            const url = params.size
              ? `${endpoint}?${params.toString()}`
              : endpoint;
            const data = await fetchJSON(url);
            const items = (Array.isArray(data?.items) ? data.items : [])
              .map(normalizeItem)
              .sort((a, b) => a.id - b.id);

            await ensureSubKegiatanReferences(items);
            const visibleItems = filterListItems(items, q);

            tableBody.innerHTML = "";
            metaText.textContent = `Total ${visibleItems.length} data`;

            if (visibleItems.length === 0) {
              tableBody.innerHTML =
                '<tr><td colspan="6" class="text-center text-muted py-4">Belum ada data</td></tr>';
              return;
            }

            visibleItems.forEach((item) =>
              tableBody.appendChild(rowTemplate(item)),
            );
          } catch (error) {
            tableBody.innerHTML =
              '<tr><td colspan="6" class="text-center text-danger py-4">Gagal memuat data</td></tr>';
            setStatus(error.message, true);
          }
        }

        form.addEventListener("submit", async (event) => {
          event.preventDefault();

          if (roleResolved && !canMutateByRole(currentUserRole)) {
            setStatus(
              "Anda tidak memiliki hak akses untuk menyimpan perubahan",
              true,
            );
            return;
          }

          const payload = {
            sub_kegiatan_id: Number(subKegiatanIdInput.value || 0),
            tahun: Number(tahunInput.value || 0),
            pagu_tahun_sebelumnya: Number(paguTahunSebelumnyaInput.value || 0),
            pagu_tahun_ini: Number(paguTahunIniInput.value || 0),
          };

          if (!payload.sub_kegiatan_id) {
            setStatus("Sub kegiatan wajib dipilih", true);
            return;
          }

          if (!payload.tahun || payload.tahun < 2000 || payload.tahun > 2100) {
            setStatus("Tahun wajib diisi (2000-2100)", true);
            tahunInput.focus();
            return;
          }

          const id = idInput.value.trim();
          const isEdit = id !== "";
          const url = isEdit ? `${endpoint}/${id}` : endpoint;
          const method = isEdit ? "PUT" : "POST";

          try {
            await fetchJSON(url, {
              method,
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify(payload),
            });

            setStatus(
              isEdit
                ? `Data ID ${id} diperbarui`
                : "Data baru berhasil disimpan",
            );
            resetForm();
            await loadList();
          } catch (error) {
            setStatus(error.message, true);
          }
        });

        btnReset.addEventListener("click", () => {
          resetForm();
          setStatus("Form direset");
        });

        btnSearch.addEventListener("click", () => {
          loadList();
        });

        queryInput.addEventListener("keydown", (event) => {
          if (event.key === "Enter") {
            event.preventDefault();
            loadList();
          }
        });

        subKegiatanFilterInput.addEventListener("input", () => {
          filterSubKegiatanOptions(subKegiatanFilterInput.value);
        });

        filterYearInput.addEventListener("keydown", (event) => {
          if (event.key === "Enter") {
            event.preventDefault();
            loadList();
          }
        });

        async function loadCurrentUser() {
          try {
            const token = getAccessToken();
            if (!token) {
              roleResolved = false;
              return;
            }
            const res = await fetch("/api/v1/auth/me", {
              headers: { Authorization: `Bearer ${token}` },
            });
            if (!res.ok) {
              const payload = decodeJwtPayload(token);
              currentUserRole = normalizeRole(payload?.role ?? "");
              roleResolved = currentUserRole !== "";
              return;
            }
            const body = await res.json();
            currentUserRole = normalizeRole(
              body?.data?.role ?? body?.data?.Role ?? "",
            );
            roleResolved = currentUserRole !== "";
          } catch (_) {
            const payload = decodeJwtPayload(getAccessToken());
            currentUserRole = normalizeRole(payload?.role ?? "");
            roleResolved = currentUserRole !== "";
          }
        }

        (async () => {
          try {
            if (!getAccessToken()) {
              redirectToLogin();
              return;
            }
            await loadCurrentUser();
            applyRoleAccess();
            await loadSubKegiatanOptions();
            resetForm();
            await loadList();
          } catch (error) {
            setStatus(error.message, true);
          }
        })();
      })();
    </script>
    <script src="/assets/js/auth-client.js?v=20260326"></script>
  </body>
</html>
