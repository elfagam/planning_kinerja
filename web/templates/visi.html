<!doctype html>
<html lang="id">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Visi - E-Planning RSUD</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link href="/assets/css/app.css" rel="stylesheet" />
    <script src="/assets/js/auth-client.js?v=20260326"></script>
    <style>
      .panel-soft {
        background: rgba(255, 255, 255, 0.9);
        border: 1px solid rgba(16, 74, 101, 0.1);
      }

      .muted-label {
        font-size: 0.78rem;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        color: #5d7380;
      }
    </style>
  </head>
  <body class="bg-soft-pattern" data-api-endpoint="/api/v1/visi">
    <div class="container py-4">
      <header
        class="mb-4 p-4 card shadow-sm border-0 header-gradient text-white"
      >
        <h1 class="h3 mb-1">Manajemen Visi</h1>
        <p class="mb-0 opacity-75">
          Kelola data visi strategis RSUD per periode
        </p>
      </header>

      <div class="row g-4">
        <div class="col-lg-4">
          <div class="card border-0 shadow-sm panel-soft">
            <div class="card-body">
              <h2 class="h6 mb-3">Form Visi</h2>
              <form id="visi-form" class="vstack gap-2">
                <input type="hidden" id="entity-id" />
                <label class="form-label mb-0 muted-label">Kode</label>
                <input
                  id="kode"
                  class="form-control"
                  placeholder="VSI-2026"
                  required
                />
                <label class="form-label mb-0 muted-label">Nama Visi</label>
                <input
                  id="nama"
                  class="form-control"
                  placeholder="Menjadi RSUD rujukan berkualitas"
                  required
                />
                <label class="form-label mb-0 muted-label">Deskripsi</label>
                <textarea
                  id="deskripsi"
                  class="form-control"
                  rows="3"
                  placeholder="Deskripsi visi"
                ></textarea>
                <div class="row g-2">
                  <div class="col-6">
                    <label class="form-label mb-0 muted-label"
                      >Tahun Mulai</label
                    >
                    <input
                      id="tahunMulai"
                      type="number"
                      class="form-control"
                      min="2000"
                      max="2100"
                      required
                    />
                  </div>
                  <div class="col-6">
                    <label class="form-label mb-0 muted-label"
                      >Tahun Selesai</label
                    >
                    <input
                      id="tahunSelesai"
                      type="number"
                      class="form-control"
                      min="2000"
                      max="2100"
                      required
                    />
                  </div>
                </div>
                <div class="form-check mt-2">
                  <input
                    id="aktif"
                    class="form-check-input"
                    type="checkbox"
                    checked
                  />
                  <label class="form-check-label" for="aktif">Aktif</label>
                </div>
                <div class="d-flex gap-2 mt-2">
                  <button type="submit" class="btn btn-primary">Simpan</button>
                  <button
                    type="button"
                    id="btn-reset"
                    class="btn btn-outline-secondary"
                  >
                    Reset
                  </button>
                </div>
                <small id="status-text" class="text-muted">Siap</small>
              </form>
            </div>
          </div>
        </div>

        <div class="col-lg-8">
          <div class="card border-0 shadow-sm panel-soft">
            <div class="card-body">
              <div
                class="d-flex justify-content-between align-items-center mb-3"
              >
                <h2 class="h6 text-uppercase text-muted mb-0">Daftar Visi</h2>
                <a href="/ui/dashboard" class="btn btn-sm btn-outline-dark"
                  >Kembali ke Dashboard</a
                >
              </div>
              <div class="row g-2 mb-3">
                <div class="col-md-8">
                  <input
                    id="query"
                    class="form-control"
                    placeholder="Cari nama atau kode"
                  />
                </div>
                <div class="col-md-4 d-grid">
                  <button
                    id="btn-search"
                    type="button"
                    class="btn btn-outline-primary"
                  >
                    Cari / Refresh
                  </button>
                </div>
              </div>
              <div class="table-responsive">
                <table class="table table-striped table-hover align-middle">
                  <thead>
                    <tr>
                      <th>ID</th>
                      <th>Kode</th>
                      <th>Nama Visi</th>
                      <th>Periode</th>
                      <th>Status</th>
                      <th>Deskripsi</th>
                      <th>Aksi</th>
                    </tr>
                  </thead>
                  <tbody id="table-body"></tbody>
                </table>
              </div>
              <div
                class="d-flex justify-content-between align-items-center mt-2"
              >
                <small id="meta-text" class="text-muted">Total 0 data</small>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script>
      (() => {
        const endpoint = document.body.dataset.apiEndpoint;
        const form = document.getElementById("visi-form");
        const idInput = document.getElementById("entity-id");
        const kodeInput = document.getElementById("kode");
        const namaInput = document.getElementById("nama");
        const deskripsiInput = document.getElementById("deskripsi");
        const tahunMulaiInput = document.getElementById("tahunMulai");
        const tahunSelesaiInput = document.getElementById("tahunSelesai");
        const aktifInput = document.getElementById("aktif");
        const statusText = document.getElementById("status-text");
        const queryInput = document.getElementById("query");
        const btnSearch = document.getElementById("btn-search");
        const btnReset = document.getElementById("btn-reset");
        const tableBody = document.getElementById("table-body");
        const metaText = document.getElementById("meta-text");

        const MUTATION_ROLES = new Set(["ADMIN", "PERENCANA", "OPERATOR"]);
        let currentUserRole = "";
        let roleResolved = false;

        function normalizeRole(raw) {
          return String(raw || "")
            .trim()
            .toUpperCase();
        }

        function canMutateByRole(role) {
          return MUTATION_ROLES.has(normalizeRole(role));
        }

        function applyRoleAccess() {
          const controls = form.querySelectorAll(
            "input, textarea, select, button[type='submit']",
          );
          const existingInfo = form.querySelector(
            '[data-role-readonly-msg="1"]',
          );

          if (!roleResolved || canMutateByRole(currentUserRole)) {
            controls.forEach((el) => {
              el.disabled = false;
            });
            if (existingInfo) {
              existingInfo.remove();
            }
            return;
          }

          controls.forEach((el) => {
            el.disabled = true;
          });

          if (!existingInfo) {
            const info = document.createElement("p");
            info.className = "text-warning small mt-2 mb-0";
            info.setAttribute("data-role-readonly-msg", "1");
            info.textContent =
              "Mode baca saja — role Anda tidak memiliki hak untuk mengubah data visi.";
            form.appendChild(info);
          }
        }

        function authHeader() {
          const token =
            localStorage.getItem("AUTH_TOKEN") ||
            localStorage.getItem("authToken") ||
            "";
          return token ? { Authorization: `Bearer ${token}` } : {};
        }

        function setStatus(message, isError = false) {
          statusText.textContent = message;
          statusText.className = isError
            ? "text-danger small"
            : "text-success small";
        }

        function normalizeItem(item) {
          return {
            id: item.id ?? item.ID,
            kode: item.kode ?? item.Kode,
            nama: item.nama ?? item.Nama,
            deskripsi: item.deskripsi ?? item.Deskripsi,
            tahunMulai: item.tahun_mulai ?? item.TahunMulai,
            tahunSelesai: item.tahun_selesai ?? item.TahunSelesai,
            aktif: item.aktif ?? item.Aktif,
          };
        }


        function resetForm() {
          idInput.value = "";
          kodeInput.value = "";
          namaInput.value = "";
          deskripsiInput.value = "";
          tahunMulaiInput.value = "";
          tahunSelesaiInput.value = "";
          aktifInput.checked = true;
        }

        function rowTemplate(item) {
          const tr = document.createElement("tr");
          const canMutate = !roleResolved || canMutateByRole(currentUserRole);
          const actionCell = canMutate
            ? `<button class="btn btn-sm btn-outline-primary me-1" data-action="edit">Edit</button>
              <button class="btn btn-sm btn-outline-danger" data-action="delete">Hapus</button>`
            : `<span class="text-muted small">Read-only</span>`;
          tr.innerHTML = `
            <td>${item.id}</td>
            <td>${item.kode}</td>
            <td>${item.nama}</td>
            <td>${item.tahunMulai} - ${item.tahunSelesai}</td>
            <td>${item.aktif ? "AKTIF" : "NONAKTIF"}</td>
            <td>${item.deskripsi || "-"}</td>
            <td class="text-nowrap">${actionCell}</td>
          `;

          tr.querySelector('[data-action="edit"]')?.addEventListener(
            "click",
            () => {
              idInput.value = item.id;
              kodeInput.value = item.kode;
              namaInput.value = item.nama;
              deskripsiInput.value = item.deskripsi || "";
              tahunMulaiInput.value = item.tahunMulai;
              tahunSelesaiInput.value = item.tahunSelesai;
              aktifInput.checked = Boolean(item.aktif);
              setStatus(`Mode edit visi ID ${item.id}`);
            },
          );

          tr.querySelector('[data-action="delete"]')?.addEventListener(
            "click",
            async () => {
              if (!confirm(`Hapus visi ID ${item.id}?`)) {
                return;
              }
              try {
                await fetchJSON(`${endpoint}/${item.id}`, { method: "DELETE" });
                setStatus(`Visi ID ${item.id} dihapus`);
                await loadList();
              } catch (err) {
                setStatus(err.message, true);
              }
            },
          );

          return tr;
        }

        async function loadList() {
          try {
            const q = queryInput.value.trim();
            const params = new URLSearchParams();
            if (q) {
              params.set("q", q);
            }
            const url = params.toString()
              ? `${endpoint}?${params.toString()}`
              : endpoint;
            const data = await fetchJSON(url);

            const items = (data.items || []).map(normalizeItem);
            metaText.textContent = `Total ${items.length} data`;
            tableBody.innerHTML = "";

            if (!items.length) {
              const tr = document.createElement("tr");
              tr.innerHTML =
                '<td colspan="7" class="text-center text-muted">Belum ada data visi</td>';
              tableBody.appendChild(tr);
              return;
            }

            items.forEach((item) => tableBody.appendChild(rowTemplate(item)));
          } catch (err) {
            setStatus(`Gagal memuat daftar: ${err.message}`, true);
          }
        }

        form.addEventListener("submit", async (e) => {
          e.preventDefault();

          if (roleResolved && !canMutateByRole(currentUserRole)) {
            setStatus(
              "Anda tidak memiliki hak akses untuk menyimpan perubahan",
              true,
            );
            return;
          }

          const payload = {
            kode: kodeInput.value.trim(),
            nama: namaInput.value.trim(),
            deskripsi: deskripsiInput.value.trim(),
            tahun_mulai: Number(tahunMulaiInput.value || 0),
            tahun_selesai: Number(tahunSelesaiInput.value || 0),
            aktif: aktifInput.checked,
          };

          const id = idInput.value.trim();
          const isEdit = id !== "";

          try {
            await fetchJSON(isEdit ? `${endpoint}/${id}` : endpoint, {
              method: isEdit ? "PUT" : "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify(payload),
            });

            setStatus(
              isEdit
                ? `Visi ID ${id} diperbarui`
                : "Visi baru berhasil disimpan",
            );
            resetForm();
            await loadList();
          } catch (err) {
            setStatus(err.message, true);
          }
        });

        btnReset.addEventListener("click", () => {
          resetForm();
          setStatus("Form direset");
        });

        btnSearch.addEventListener("click", loadList);
        queryInput.addEventListener("keydown", (e) => {
          if (e.key === "Enter") {
            e.preventDefault();
            loadList();
          }
        });

        async function loadCurrentUser() {
          try {
            const token =
              localStorage.getItem("AUTH_TOKEN") ||
              localStorage.getItem("authToken") ||
              "";
            if (!token) {
              roleResolved = false;
              return;
            }
            const res = await fetch("/api/v1/auth/me", {
              headers: { Authorization: `Bearer ${token}` },
            });
            if (!res.ok) {
              roleResolved = false;
              return;
            }
            const body = await res.json();
            currentUserRole = normalizeRole(
              body?.data?.role ?? body?.data?.Role ?? "",
            );
            roleResolved = currentUserRole !== "";
          } catch (_) {
            // non-fatal: keep editable and rely on backend authorization.
            roleResolved = false;
          }
        }

        resetForm();
        loadCurrentUser().then(() => {
          applyRoleAccess();
          loadList();
        });
      })();
    </script>
    
  </body>
</html>
