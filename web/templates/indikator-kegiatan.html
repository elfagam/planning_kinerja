<!doctype html>
<html lang="id">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Indikator Kegiatan - E-Planning RSUD</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link href="/assets/css/app.css" rel="stylesheet" />
  </head>
  <body
    class="bg-soft-pattern"
    data-module-name="Indikator Kegiatan"
    data-api-endpoint="/api/v1/indikator_kegiatan"
  >
    <main class="container py-4">
      <header
        class="mb-4 p-4 card shadow-sm border-0 header-gradient text-white"
      >
        <h1 class="h3 mb-1" id="module-title">CRUD</h1>
        <p class="mb-0 opacity-75">
          Kelola data Indikator Kegiatan secara terpisah
        </p>
      </header>

      <div class="row g-4">
        <section class="col-lg-4" aria-label="Form Indikator Kegiatan">
          <div class="card border-0 shadow-sm">
            <div class="card-body">
              <h2 class="h6 text-uppercase text-muted">Form Data</h2>
              <form id="crud-form" class="vstack gap-2" autocomplete="off">
                <input type="hidden" id="entity-id" />

                <label class="form-label mb-0" for="programId">Program</label>
                <textarea
                  id="programId"
                  class="form-control"
                  placeholder="(otomatis dari indikator program)"
                  disabled
                ></textarea>

                <label class="form-label mb-0" for="indikatorProgramId"
                  >Indikator Program</label
                >
                <select id="indikatorProgramId" class="form-select" required>
                  <option value="">Pilih indikator program</option>
                </select>

                <label class="form-label mb-0" for="kegiatanId">Kegiatan</label>
                <select id="kegiatanId" class="form-select" required>
                  <option value="">Pilih kegiatan</option>
                </select>

                <label class="form-label mb-0" for="kode">Kode</label>
                <input
                  id="kode"
                  class="form-control"
                  placeholder="IK-001"
                  required
                />

                <label class="form-label mb-0" for="nama">Nama</label>
                <textarea
                  id="nama"
                  class="form-control"
                  rows="3"
                  placeholder="Nama indikator kegiatan"
                  required
                ></textarea>

                <label class="form-label mb-0" for="formula">Formula</label>
                <textarea
                  id="formula"
                  class="form-control"
                  rows="3"
                  placeholder="Contoh: (jumlah capaian / jumlah target) x 100"
                ></textarea>

                <label class="form-label mb-0" for="satuan">Satuan</label>
                <input id="satuan" class="form-control" placeholder="%" />

                <label class="form-label mb-0" for="baseline">Baseline</label>
                <input
                  id="baseline"
                  type="number"
                  step="0.01"
                  class="form-control"
                  value="0"
                />

                <div class="d-flex gap-2 mt-2">
                  <button type="submit" class="btn btn-primary">Simpan</button>
                  <button
                    type="button"
                    id="btn-reset"
                    class="btn btn-outline-secondary"
                  >
                    Reset
                  </button>
                </div>
                <small id="status-text" class="text-muted" aria-live="polite"
                  >Siap</small
                >
              </form>
            </div>
          </div>
        </section>

        <section class="col-lg-8" aria-label="Daftar Indikator Kegiatan">
          <div class="card border-0 shadow-sm">
            <div class="card-body">
              <div
                class="d-flex justify-content-between align-items-center mb-3"
              >
                <h2 class="h6 text-uppercase text-muted mb-0">Daftar Data</h2>
                <a href="/ui/dashboard" class="btn btn-sm btn-outline-dark"
                  >Kembali ke Dashboard</a
                >
              </div>

              <div class="row g-2 mb-3">
                <div class="col-md-8">
                  <input
                    id="query"
                    class="form-control"
                    placeholder="Cari nama atau kode"
                    aria-label="Cari nama atau kode"
                  />
                </div>
                <div class="col-md-4 d-grid">
                  <button
                    id="btn-search"
                    type="button"
                    class="btn btn-outline-primary"
                  >
                    Cari / Refresh
                  </button>
                </div>
              </div>
              <div class="table-responsive">
                <table class="table table-striped table-hover align-middle">
                  <caption class="visually-hidden">
                    Tabel data Indikator Kegiatan
                  </caption>
                  <thead>
                    <tr>
                      <th scope="col" data-sort-key="id">ID</th>
                      <th scope="col" data-sort-key="indikator_program_id">
                        Indikator Program
                      </th>
                      <th scope="col" data-sort-key="kegiatan_id">Kegiatan</th>
                      <th scope="col" data-sort-key="kode">Kode</th>
                      <th scope="col" data-sort-key="nama">Nama</th>
                      <th scope="col">Formula</th>
                      <th scope="col">Satuan</th>
                      <th scope="col" data-sort-key="baseline">Baseline</th>
                      <th scope="col">Aksi</th>
                    </tr>
                  </thead>
                  <tbody id="table-body"></tbody>
                </table>
              </div>
              <div
                class="d-flex justify-content-between align-items-center mt-2"
              >
                <small id="meta-text" class="text-muted">Total 0 data</small>
                <div class="d-flex align-items-center gap-2">
                  <select id="limit-select" class="form-select form-select-sm">
                    <option value="10">10 / halaman</option>
                    <option value="25">25 / halaman</option>
                    <option value="50">50 / halaman</option>
                  </select>
                  <button
                    id="page-prev"
                    type="button"
                    class="btn btn-sm btn-outline-secondary"
                  >
                    Prev
                  </button>
                  <small id="page-text" class="text-muted">Page 1/1</small>
                  <button
                    id="page-next"
                    type="button"
                    class="btn btn-sm btn-outline-secondary"
                  >
                    Next
                  </button>
                </div>
              </div>
            </div>
          </div>
        </section>
      </div>
    </main>

    <script>
      (() => {
        const endpoint = document.body.dataset.apiEndpoint;
        const kegiatanEndpoint = "/api/v1/kegiatan";
        const form = document.getElementById("crud-form");
        const idInput = document.getElementById("entity-id");
        const programIdInput = document.getElementById("programId");
        const kegiatanIdInput = document.getElementById("kegiatanId");
        const kodeInput = document.getElementById("kode");
        const namaInput = document.getElementById("nama");
        const formulaInput = document.getElementById("formula");
        const satuanInput = document.getElementById("satuan");
        const baselineInput = document.getElementById("baseline");
        const statusText = document.getElementById("status-text");
        const queryInput = document.getElementById("query");
        const btnSearch = document.getElementById("btn-search");
        const btnReset = document.getElementById("btn-reset");
        const tableBody = document.getElementById("table-body");
        const metaText = document.getElementById("meta-text");
        const limitSelect = document.getElementById("limit-select");
        const pagePrevBtn = document.getElementById("page-prev");
        const pageNextBtn = document.getElementById("page-next");
        const pageText = document.getElementById("page-text");
        const sortHeaders = Array.from(
          document.querySelectorAll("th[data-sort-key]"),
        );

        const kegiatanMap = new Map();
        const indikatorProgramEndpoint = "/api/v1/indikator_program";
        const indikatorProgramIdInput =
          document.getElementById("indikatorProgramId");
        const indikatorProgramMap = new Map();
        const DEFAULT_SORT_BY = "id";
        const DEFAULT_ORDER = "desc";
        const DEFAULT_PAGE = 1;
        const DEFAULT_LIMIT = 10;
        const FILTER_DEBOUNCE_MS = 300;
        const sortableFields = new Set([
          "id",
          "indikator_program_id",
          "kegiatan_id",
          "kode",
          "nama",
          "baseline",
        ]);

        const state = {
          q: "",
          sortBy: DEFAULT_SORT_BY,
          order: DEFAULT_ORDER,
          page: DEFAULT_PAGE,
          limit: DEFAULT_LIMIT,
        };

        let searchDebounceTimer = null;
        let currentListItems = [];
        let kegiatanItems = [];

        const MUTATION_ROLES = new Set(["ADMIN", "PERENCANA", "OPERATOR"]);
        let currentUserRole = "";

        function normalizeRole(raw) {
          return String(raw || "").trim().toUpperCase();
        }

        function canMutateByRole(role) {
          return MUTATION_ROLES.has(normalizeRole(role));
        }

        function applyRoleAccess() {
          if (canMutateByRole(currentUserRole)) return;
          form.querySelectorAll("input, textarea, select, button[type='submit']").forEach((el) => {
            el.disabled = true;
          });
          const info = document.createElement("p");
          info.className = "text-warning small mt-2 mb-0";
          info.textContent = "Mode baca saja — role Anda tidak memiliki hak untuk mengubah data.";
          form.appendChild(info);
        }
        function authHeader() {
          const token =
            localStorage.getItem("AUTH_TOKEN") ||
            localStorage.getItem("authToken") ||
            "";
          return token ? { Authorization: `Bearer ${token}` } : {};
        }

        function setStatus(message, isError = false) {
          statusText.textContent = message;
          statusText.className = isError
            ? "text-danger small"
            : "text-success small";
        }

        function normalizeKegiatan(raw) {
          return {
            id: Number(raw.id ?? raw.ID ?? 0),
            programId: Number(raw.program_id ?? raw.ProgramID ?? 0),
            kode: raw.kode ?? raw.Kode ?? "",
            nama: raw.nama ?? raw.Nama ?? "",
          };
        }

        function normalizeIndikatorProgram(raw) {
          return {
            id: Number(raw.id ?? raw.ID ?? 0),
            kode: raw.kode ?? raw.Kode ?? "",
            nama: raw.nama ?? raw.Nama ?? "",
            programId: Number(raw.program_id ?? raw.ProgramID ?? 0),
            programNama: raw.program_nama ?? raw.ProgramNama ?? "",
          };
        }

        function normalizeItem(raw) {
          return {
            id: Number(raw.id ?? raw.ID ?? 0),
            indikator_program_id: Number(
              raw.indikator_program_id ?? raw.IndikatorProgramID ?? 0,
            ),
            kegiatanId: Number(raw.kegiatan_id ?? raw.KegiatanID ?? 0),
            programId: Number(raw.program_id ?? raw.ProgramID ?? 0),
            kode: raw.kode ?? raw.Kode ?? "",
            nama: raw.nama ?? raw.Nama ?? "",
            formula: raw.formula ?? raw.Formula ?? "",
            satuan: raw.satuan ?? raw.Satuan ?? "",
            baseline: Number(raw.baseline ?? raw.Baseline ?? 0),
          };
        }

        async function fetchJSON(url, options = {}) {
          const res = await fetch(url, {
            ...options,
            headers: {
              ...(options.headers || {}),
              ...authHeader(),
            },
          });

          const body = await res.json();
          if (!res.ok || !body.success) {
            throw new Error(body.error || `HTTP ${res.status}`);
          }

          return body.data;
        }

        function isDuplicateKode(kode, editingID) {
          const normalizedKode = String(kode || "")
            .trim()
            .toLowerCase();
          if (!normalizedKode) {
            return false;
          }
          return currentListItems.some((item) => {
            const itemID = Number(item.id || 0);
            if (editingID > 0 && itemID === editingID) {
              return false;
            }
            return (
              String(item.kode || "")
                .trim()
                .toLowerCase() === normalizedKode
            );
          });
        }

        function suggestNextKode() {
          let maxNumber = 0;
          let padWidth = 3;
          currentListItems.forEach((item) => {
            const kode = String(item.kode || "").trim();
            const match = /^IK-(\d+)$/i.exec(kode);
            if (!match) {
              return;
            }
            const numberPart = match[1];
            const parsed = Number(numberPart);
            if (Number.isFinite(parsed) && parsed > maxNumber) {
              maxNumber = parsed;
              padWidth = Math.max(padWidth, numberPart.length);
            }
          });
          const nextNumber = maxNumber + 1;
          return `IK-${String(nextNumber).padStart(padWidth, "0")}`;
        }

        function resetForm() {
          idInput.value = "";
          programIdInput.value = "";
          indikatorProgramIdInput.value = "";
          kegiatanIdInput.value = "";
          kodeInput.value = suggestNextKode();
          namaInput.value = "";
          formulaInput.value = "";
          satuanInput.value = "";
          baselineInput.value = "0";
          renderKegiatanOptionsByProgram(0);
        }

        function kegiatanLabel(kegiatanId) {
          return (
            kegiatanMap.get(Number(kegiatanId)) || `Kegiatan #${kegiatanId}`
          );
        }

        function indikatorProgramLabel(id) {
          const meta = indikatorProgramMap.get(Number(id));
          return meta?.label || `Indikator Program #${id}`;
        }

        function renderKegiatanOptionsByProgram(
          programId,
          selectedKegiatanId = "",
        ) {
          const normalizedProgramId = Number(programId || 0);
          const desiredSelection = String(selectedKegiatanId || "");

          kegiatanMap.clear();
          kegiatanIdInput.innerHTML = "";

          const defaultOption = document.createElement("option");
          defaultOption.value = "";

          if (normalizedProgramId <= 0) {
            defaultOption.textContent = "Pilih indikator program dahulu";
            kegiatanIdInput.appendChild(defaultOption);
            kegiatanIdInput.value = "";
            kegiatanIdInput.disabled = true;
            return;
          }

          defaultOption.textContent = "Pilih kegiatan";
          kegiatanIdInput.appendChild(defaultOption);

          const filtered = kegiatanItems.filter(
            (item) => item.programId === normalizedProgramId,
          );

          filtered.forEach((item) => {
            const label = `${item.kode} - ${item.nama}`;
            kegiatanMap.set(item.id, label);

            const option = document.createElement("option");
            option.value = String(item.id);
            option.textContent = label;
            kegiatanIdInput.appendChild(option);
          });

          kegiatanIdInput.disabled = false;

          if (
            desiredSelection &&
            filtered.some((item) => String(item.id) === desiredSelection)
          ) {
            kegiatanIdInput.value = desiredSelection;
          } else {
            kegiatanIdInput.value = "";
          }
        }

        function syncProgramFromIndikatorProgram() {
          const indikatorProgramId = Number(indikatorProgramIdInput.value);
          const meta = indikatorProgramMap.get(indikatorProgramId);

          if (!meta) {
            programIdInput.value = "";
            return 0;
          }

          if (meta.programNama && meta.programId > 0) {
            programIdInput.value = `${meta.programId} - ${meta.programNama}`;
            return meta.programId;
          }

          if (meta.programNama) {
            programIdInput.value = meta.programNama;
            return meta.programId;
          }

          if (meta.programId > 0) {
            programIdInput.value = `Program #${meta.programId}`;
            return meta.programId;
          }

          programIdInput.value = "";
          return 0;
        }

        function parseStateFromURL() {
          const params = new URLSearchParams(window.location.search);
          const q = params.get("q") || "";
          const sortBy = params.get("sort_by") || DEFAULT_SORT_BY;
          const orderRaw = (params.get("order") || DEFAULT_ORDER).toLowerCase();
          const pageRaw = Number(params.get("page") || DEFAULT_PAGE);
          const limitRaw = Number(params.get("limit") || DEFAULT_LIMIT);

          state.q = q;
          state.sortBy = sortableFields.has(sortBy) ? sortBy : DEFAULT_SORT_BY;
          state.order = orderRaw === "asc" ? "asc" : "desc";
          state.page =
            Number.isFinite(pageRaw) && pageRaw > 0 ? pageRaw : DEFAULT_PAGE;
          state.limit =
            Number.isFinite(limitRaw) && limitRaw > 0
              ? limitRaw
              : DEFAULT_LIMIT;
          queryInput.value = state.q;
          limitSelect.value = String(state.limit);
        }

        function writeStateToURL() {
          const params = new URLSearchParams(window.location.search);

          if (state.q) {
            params.set("q", state.q);
          } else {
            params.delete("q");
          }

          params.set("sort_by", state.sortBy);
          params.set("order", state.order);
          params.set("page", String(state.page));
          params.set("limit", String(state.limit));

          const next = `${window.location.pathname}?${params.toString()}`;
          window.history.replaceState(null, "", next);
        }

        function updatePaginationUI(page, totalPages) {
          pageText.textContent = `Page ${page}/${totalPages}`;
          pagePrevBtn.disabled = page <= 1;
          pageNextBtn.disabled = page >= totalPages;
        }

        function sortIndicator(order) {
          return order === "asc" ? "↑" : "↓";
        }

        function updateSortHeaderUI() {
          sortHeaders.forEach((th) => {
            const key = th.dataset.sortKey;
            const base = th.dataset.baseLabel || th.textContent.trim();

            th.dataset.baseLabel = base;
            th.style.cursor = "pointer";

            if (key === state.sortBy) {
              th.textContent = `${base} ${sortIndicator(state.order)}`;
            } else {
              th.textContent = base;
            }
          });
        }

        function readSortValue(item, key) {
          if (key === "kegiatan_id") {
            return item.kegiatanId;
          }

          return item[key];
        }

        function applyClientSort(items) {
          const direction = state.order === "asc" ? 1 : -1;
          return [...items].sort((a, b) => {
            const left = readSortValue(a, state.sortBy);
            const right = readSortValue(b, state.sortBy);

            if (typeof left === "string" || typeof right === "string") {
              return (
                String(left || "").localeCompare(String(right || ""), "id", {
                  sensitivity: "base",
                }) * direction
              );
            }

            return (Number(left || 0) - Number(right || 0)) * direction;
          });
        }

        function rowTemplate(item) {
          const tr = document.createElement("tr");
          tr.innerHTML = `
            <td>${item.id}</td>
            <td>${indikatorProgramLabel(item.indikator_program_id)}</td>
            <td>${kegiatanLabel(item.kegiatanId)}</td>
            <td>${item.kode}</td>
            <td>${item.nama}</td>
            <td>${item.formula || "-"}</td>
            <td>${item.satuan || "-"}</td>
            <td>${item.baseline.toFixed(2)}</td>

            <td class="text-nowrap">
              ${canMutateByRole(currentUserRole) ? '<button class="btn btn-sm btn-outline-primary me-1" data-action="edit">Edit</button><button class="btn btn-sm btn-outline-danger" data-action="delete">Hapus</button>' : '<span class="text-muted small">Read-only</span>'}
            </td>
          `;

          tr.querySelector('[data-action="edit"]')?.addEventListener(
            "click",
            () => {
              idInput.value = item.id;
              indikatorProgramIdInput.value = String(item.indikator_program_id);
              const selectedProgramId = syncProgramFromIndikatorProgram();
              renderKegiatanOptionsByProgram(
                selectedProgramId,
                String(item.kegiatanId),
              );
              kodeInput.value = item.kode;
              namaInput.value = item.nama;
              formulaInput.value = item.formula;
              satuanInput.value = item.satuan;
              baselineInput.value = String(item.baseline);
              setStatus(`Mode edit ID ${item.id}`);
            },
          );

          tr.querySelector('[data-action="delete"]')?.addEventListener(
            "click",
            async () => {
              if (!confirm(`Hapus indikator kegiatan ${item.nama}?`)) {
                return;
              }

              try {
                await fetchJSON(`${endpoint}/${item.id}`, { method: "DELETE" });
                setStatus("Data berhasil dihapus");
                if (Number(idInput.value) === item.id) {
                  resetForm();
                }
                await loadList();
              } catch (error) {
                setStatus(error.message, true);
              }
            },
          );

          return tr;
        }

        async function loadKegiatanOptions() {
          try {
            const data = await fetchJSON(kegiatanEndpoint);
            kegiatanItems = (Array.isArray(data?.items) ? data.items : [])
              .map(normalizeKegiatan)
              .sort((a, b) => a.id - b.id);

            const selectedProgramId = syncProgramFromIndikatorProgram();
            renderKegiatanOptionsByProgram(
              selectedProgramId,
              kegiatanIdInput.value,
            );
            {
              {
                /* console.log("Indikator Kegiatan items:", kegiatanItems); */
              }
            }
          } catch (error) {
            setStatus(
              `Pilihan kegiatan tidak ditemukan: ${error.message}`,
              true,
            );
          }
        }

        async function loadIndikatorProgramOptions() {
          try {
            const data = await fetchJSON(indikatorProgramEndpoint);
            const indikatorProgramItems = (
              Array.isArray(data?.items) ? data.items : []
            )

              .map(normalizeIndikatorProgram)
              .sort((a, b) => a.id - b.id);

            indikatorProgramMap.clear();
            indikatorProgramIdInput.innerHTML =
              '<option value="">Pilih indikator program</option>';

            indikatorProgramItems.forEach((item) => {
              const label = `${item.kode} - ${item.nama}`;
              indikatorProgramMap.set(item.id, {
                label,
                programId: item.programId,
                programNama: item.programNama,
              });

              const option = document.createElement("option");
              option.value = String(item.id);
              option.textContent = label;
              indikatorProgramIdInput.appendChild(option);
            });

            syncProgramFromIndikatorProgram();

            {
              {
                /* console.log("Indikator Program items:", indikatorProgramItems); */
              }
            }
          } catch (error) {
            indikatorProgramIdInput.innerHTML =
              '<option value="">(Gagal memuat data)</option>';
          }
        }

        indikatorProgramIdInput.addEventListener("change", () => {
          const selectedProgramId = syncProgramFromIndikatorProgram();
          renderKegiatanOptionsByProgram(selectedProgramId);
          setStatus(`Siap`, false);
        });

        async function loadList() {
          tableBody.innerHTML =
            '<tr><td colspan="9" class="text-center text-muted py-4">Memuat...</td></tr>';

          try {
            const params = new URLSearchParams();
            if (state.q) {
              params.set("q", state.q);
            }
            params.set("sort_by", state.sortBy);
            params.set("order", state.order);
            params.set("page", String(state.page));
            params.set("limit", String(state.limit));

            const url = params.size
              ? `${endpoint}?${params.toString()}`
              : endpoint;
            const data = await fetchJSON(url);
            const items = (Array.isArray(data?.items) ? data.items : []).map(
              normalizeItem,
            );
            currentListItems = items;

            tableBody.innerHTML = "";
            const sortedItems = applyClientSort(items);
            const hasServerPaginationMeta =
              data?.page != null ||
              data?.total_pages != null ||
              data?.limit != null;

            let renderedItems = sortedItems;
            let totalItems = Number(data?.total ?? sortedItems.length);
            let totalPages = 1;

            if (hasServerPaginationMeta) {
              const serverPage = Number(data?.page ?? state.page);
              const serverLimit = Number(
                data?.limit ?? state.limit ?? DEFAULT_LIMIT,
              );
              const serverTotalPages = Number(
                data?.total_pages ??
                  Math.ceil(totalItems / Math.max(1, serverLimit)),
              );

              state.page =
                Number.isFinite(serverPage) && serverPage > 0
                  ? serverPage
                  : DEFAULT_PAGE;
              state.limit =
                Number.isFinite(serverLimit) && serverLimit > 0
                  ? serverLimit
                  : DEFAULT_LIMIT;
              totalPages =
                Number.isFinite(serverTotalPages) && serverTotalPages > 0
                  ? serverTotalPages
                  : 1;
            } else {
              totalItems = sortedItems.length;
              totalPages = Math.max(1, Math.ceil(totalItems / state.limit));
              if (state.page > totalPages) {
                state.page = totalPages;
              }
              const start = (state.page - 1) * state.limit;
              const end = start + state.limit;
              renderedItems = sortedItems.slice(start, end);
            }

            limitSelect.value = String(state.limit);
            metaText.textContent = `Total ${totalItems} data`;

            if (totalItems > 0 && state.page > totalPages) {
              state.page = totalPages;
              writeStateToURL();
              await loadList();
              return;
            }

            updatePaginationUI(state.page, totalPages);
            writeStateToURL();

            if (renderedItems.length === 0) {
              tableBody.innerHTML =
                '<tr><td colspan="9" class="text-center text-muted py-4">Belum ada data</td></tr>';
              return;
            }

            renderedItems.forEach((item) =>
              tableBody.appendChild(rowTemplate(item)),
            );
          } catch (error) {
            tableBody.innerHTML =
              '<tr><td colspan="9" class="text-center text-danger py-4">Gagal memuat data</td></tr>';
            updatePaginationUI(1, 1);
            setStatus(error.message, true);
          }
        }

        function syncStateFromInputs() {
          state.q = queryInput.value.trim();
        }

        function queueRealtimeSearch() {
          syncStateFromInputs();
          state.page = DEFAULT_PAGE;
          writeStateToURL();

          if (searchDebounceTimer) {
            window.clearTimeout(searchDebounceTimer);
          }

          searchDebounceTimer = window.setTimeout(() => {
            loadList();
          }, FILTER_DEBOUNCE_MS);
        }

        form.addEventListener("submit", async (event) => {
          event.preventDefault();

          if (!canMutateByRole(currentUserRole)) {
            setStatus("Anda tidak memiliki hak akses untuk menyimpan perubahan", true);
            return;
          }

          const indikatorProgramId = indikatorProgramIdInput.value;
          // Validasi: indikatorProgramId harus angka
          if (!indikatorProgramId || isNaN(Number(indikatorProgramId))) {
            setStatus(
              "Indikator Program wajib dipilih dan harus berupa angka",
              true,
            );
            indikatorProgramIdInput.focus();
            return;
          }

          const kegiatanId = kegiatanIdInput.value;
          if (!kegiatanId || isNaN(Number(kegiatanId))) {
            setStatus("Kegiatan wajib dipilih dan harus berupa angka", true);
            kegiatanIdInput.focus();
            return;
          }

          const kode = kodeInput.value.trim();
          if (!kode) {
            setStatus("Kode wajib diisi", true);
            kodeInput.focus();
            return;
          }

          const nama = namaInput.value.trim();
          if (!nama) {
            setStatus("Nama wajib diisi", true);
            namaInput.focus();
            return;
          }

          const id = idInput.value.trim();
          const editingID = id ? Number(id) : 0;
          if (isDuplicateKode(kode, editingID)) {
            const suggestedKode = suggestNextKode();
            kodeInput.value = suggestedKode;
            setStatus(
              `Kode indikator kegiatan sudah digunakan. Saran kode: ${suggestedKode}`,
              true,
            );
            kodeInput.focus();
            return;
          }

          const payload = {
            indikator_program_id: Number(indikatorProgramId),
            kegiatan_id: Number(kegiatanId),
            kode,
            nama,
            formula: formulaInput.value.trim(),
            satuan: satuanInput.value.trim(),
            baseline: Number(baselineInput.value || 0),
          };

          {
            {
              /* console.log(payload); */
            }
          }

          const isEdit = id !== "";
          const url = isEdit ? `${endpoint}/${id}` : endpoint;
          const method = isEdit ? "PUT" : "POST";

          try {
            await fetchJSON(url, {
              method,
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify(payload),
            });

            setStatus(
              isEdit
                ? `Data ID ${id} diperbarui`
                : "Data baru berhasil disimpan",
            );
            resetForm();
            await loadList();
          } catch (error) {
            if (
              String(error.message || "")
                .toLowerCase()
                .includes("kode indikator_kegiatan sudah digunakan")
            ) {
              const suggestedKode = suggestNextKode();
              kodeInput.value = suggestedKode;
              setStatus(
                `Kode sudah dipakai. Saran kode baru: ${suggestedKode}`,
                true,
              );
              kodeInput.focus();
              return;
            }
            setStatus(error.message, true);
          }
        });

        btnReset.addEventListener("click", () => {
          resetForm();
          setStatus("Form direset");
        });

        btnSearch.addEventListener("click", () => {
          syncStateFromInputs();
          state.page = DEFAULT_PAGE;
          writeStateToURL();
          loadList();
        });

        limitSelect.addEventListener("change", () => {
          const limit = Number(limitSelect.value || DEFAULT_LIMIT);
          state.limit =
            Number.isFinite(limit) && limit > 0 ? limit : DEFAULT_LIMIT;
          state.page = DEFAULT_PAGE;
          writeStateToURL();
          loadList();
        });

        pagePrevBtn.addEventListener("click", () => {
          if (state.page <= 1) {
            return;
          }
          state.page -= 1;
          writeStateToURL();
          loadList();
        });

        pageNextBtn.addEventListener("click", () => {
          state.page += 1;
          writeStateToURL();
          loadList();
        });

        queryInput.addEventListener("input", queueRealtimeSearch);

        sortHeaders.forEach((th) => {
          th.addEventListener("click", () => {
            const nextSortBy = th.dataset.sortKey;

            if (!sortableFields.has(nextSortBy)) {
              return;
            }

            if (state.sortBy === nextSortBy) {
              state.order = state.order === "asc" ? "desc" : "asc";
            } else {
              state.sortBy = nextSortBy;
              state.order = "asc";
            }
            state.page = DEFAULT_PAGE;

            updateSortHeaderUI();
            writeStateToURL();
            loadList();
          });
        });

        window.addEventListener("popstate", () => {
          parseStateFromURL();
          updateSortHeaderUI();
          loadList();
        });

        parseStateFromURL();
        updateSortHeaderUI();
        writeStateToURL();

        renderKegiatanOptionsByProgram(0);

        loadKegiatanOptions();
        loadIndikatorProgramOptions();
        async function loadCurrentUser() {
          try {
            const token =
              localStorage.getItem("AUTH_TOKEN") ||
              localStorage.getItem("authToken") ||
              "";
            if (!token) return;
            const res = await fetch("/api/v1/auth/me", {
              headers: { Authorization: `Bearer ${token}` },
            });
            if (!res.ok) return;
            const body = await res.json();
            currentUserRole = normalizeRole(body?.data?.role ?? "");
          } catch (_) {
            // non-fatal: fallback to read-only
          }
        }

        loadCurrentUser().then(() => {
          applyRoleAccess();
          loadList();
        });
      })();
    </script>
    <script src="/assets/js/auth-client.js"></script>
  </body>
</html>
