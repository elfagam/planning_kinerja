<!doctype html>
<html lang="id">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Program - E-Planning RSUD</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link href="/assets/css/app.css" rel="stylesheet" />
    <style>
      .panel-soft {
        background: rgba(255, 255, 255, 0.9);
        border: 1px solid rgba(16, 74, 101, 0.1);
      }

      .muted-label {
        font-size: 0.78rem;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        color: #5d7380;
      }
    </style>
  </head>
  <body class="bg-soft-pattern" data-api-endpoint="/api/v1/program">
    <div class="container py-4">
      <header
        class="mb-4 p-4 card shadow-sm border-0 header-gradient text-white"
      >
        <h1 class="h3 mb-1">Manajemen Program</h1>
        <p class="mb-0 opacity-75">
          Kelola program berdasarkan sasaran strategis
        </p>
      </header>

      <div class="row g-4">
        <div class="col-lg-4">
          <div class="card border-0 shadow-sm panel-soft">
            <div class="card-body">
              <h2 class="h6 mb-3">Form Program</h2>
              <form id="program-form" class="vstack gap-2">
                <input type="hidden" id="entity-id" />
                <label class="form-label mb-0 muted-label">Kode</label>
                <input
                  id="kode"
                  class="form-control"
                  placeholder="PRG-001"
                  required
                />
                <label class="form-label mb-0 muted-label">Nama Program</label>
                <input
                  id="nama"
                  class="form-control"
                  placeholder="Program peningkatan mutu layanan"
                  required
                />
                <label class="form-label mb-0 muted-label">Deskripsi</label>
                <textarea
                  id="deskripsi"
                  class="form-control"
                  rows="3"
                  placeholder="Deskripsi program"
                ></textarea>
                <div class="d-flex gap-2 mt-2">
                  <button type="submit" class="btn btn-primary">Simpan</button>
                  <button
                    type="button"
                    id="btn-reset"
                    class="btn btn-outline-secondary"
                  >
                    Reset
                  </button>
                </div>
                <small id="status-text" class="text-muted">Siap</small>
              </form>
            </div>
          </div>
        </div>

        <div class="col-lg-8">
          <div class="card border-0 shadow-sm panel-soft">
            <div class="card-body">
              <div
                class="d-flex justify-content-between align-items-center mb-3"
              >
                <h2 class="h6 text-uppercase text-muted mb-0">
                  Daftar Program
                </h2>
                <a href="/ui/dashboard" class="btn btn-sm btn-outline-dark"
                  >Kembali ke Dashboard</a
                >
              </div>
              <div class="row g-2 mb-3">
                <div class="col-md-5">
                  <input
                    id="query"
                    class="form-control"
                    placeholder="Cari nama atau kode"
                  />
                </div>
                <div class="col-md-7 d-grid">
                  <button
                    id="btn-search"
                    type="button"
                    class="btn btn-outline-primary"
                  >
                    Cari / Refresh
                  </button>
                </div>
              </div>
              <div class="table-responsive">
                <table class="table table-striped table-hover align-middle">
                  <thead>
                    <tr>
                      <th>ID</th>
                      <th>Kode</th>
                      <th>Nama Program</th>
                      <th>Deskripsi</th>
                      <th>Dibuat</th>
                      <th>Diupdate</th>
                      <th>Aksi</th>
                    </tr>
                  </thead>
                  <tbody id="table-body"></tbody>
                </table>
              </div>
              <div
                class="d-flex justify-content-between align-items-center mt-2"
              >
                <small id="meta-text" class="text-muted">Total 0 data</small>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script>
      (() => {
        const endpoint = document.body.dataset.apiEndpoint;
        const unitPengusulEndpoint = "/api/v1/unit_pengusul";
        const form = document.getElementById("program-form");
        const idInput = document.getElementById("entity-id");
        const kodeInput = document.getElementById("kode");
        const namaInput = document.getElementById("nama");
        const deskripsiInput = document.getElementById("deskripsi");
        const statusText = document.getElementById("status-text");
        const queryInput = document.getElementById("query");
        const btnSearch = document.getElementById("btn-search");
        const btnReset = document.getElementById("btn-reset");
        const tableBody = document.getElementById("table-body");
        const metaText = document.getElementById("meta-text");

        const sasaranMap = new Map();
        let cachedDefaultUnitPengusulId = 0;

        const MUTATION_ROLES = new Set(["ADMIN", "PERENCANA", "OPERATOR"]);
        let currentUserRole = "";

        function normalizeRole(raw) {
          return String(raw || "").trim().toUpperCase();
        }

        function canMutateByRole(role) {
          return MUTATION_ROLES.has(normalizeRole(role));
        }

        function applyRoleAccess() {
          if (canMutateByRole(currentUserRole)) return;
          form.querySelectorAll("input, textarea, select, button[type='submit']").forEach((el) => {
            el.disabled = true;
          });
          const info = document.createElement("p");
          info.className = "text-warning small mt-2 mb-0";
          info.textContent = "Mode baca saja — role Anda tidak memiliki hak untuk mengubah data.";
          form.appendChild(info);
        }
        function authHeader() {
          const token =
            localStorage.getItem("AUTH_TOKEN") ||
            localStorage.getItem("authToken") ||
            "";
          return token ? { Authorization: `Bearer ${token}` } : {};
        }

        function setStatus(message, isError = false) {
          statusText.textContent = message;
          statusText.className = isError
            ? "text-danger small"
            : "text-success small";
        }

        function normalizeItem(item) {
          return {
            id: item.id ?? item.ID,
            kode: item.kode ?? item.Kode,
            nama: item.nama ?? item.Nama,
            deskripsi: item.deskripsi ?? item.Deskripsi,
            created_at: item.created_at ?? item.Created_at,
            updated_at: item.updated_at ?? item.Updated_at,
          };
        }


        async function resolveDefaultUnitPengusulId() {
          if (cachedDefaultUnitPengusulId > 0) {
            return cachedDefaultUnitPengusulId;
          }

          const data = await fetchJSON(unitPengusulEndpoint);
          const items = Array.isArray(data?.items) ? data.items : [];
          if (items.length === 0) {
            throw new Error("default unit_pengusul not found");
          }

          const first = items[0];
          const id = Number(first.id ?? first.ID ?? 0);
          if (!id) {
            throw new Error("default unit_pengusul not found");
          }

          cachedDefaultUnitPengusulId = id;
          return id;
        }

        function resetForm() {
          idInput.value = "";
          kodeInput.value = "";
          namaInput.value = "";
          deskripsiInput.value = "";
        }

        function rowTemplate(item) {
          const tr = document.createElement("tr");
          tr.innerHTML = `
            <td>${item.id}</td>
            <td>${item.kode}</td>
            <td>${item.nama}</td>
            <td>${item.deskripsi || "-"}</td>
            <td>${item.created_at ? new Date(item.created_at).toLocaleString() : "-"}</td>
            <td>${item.updated_at ? new Date(item.updated_at).toLocaleString() : "-"}</td>
            <td class="text-nowrap">
              ${canMutateByRole(currentUserRole) ? '<button class="btn btn-sm btn-outline-primary me-1" data-action="edit">Edit</button><button class="btn btn-sm btn-outline-danger" data-action="delete">Hapus</button>' : '<span class="text-muted small">Read-only</span>'}
            </td>
          `;
          tr.querySelector('[data-action="edit"]')?.addEventListener(
            "click",
            () => {
              idInput.value = item.id;
              kodeInput.value = item.kode;
              namaInput.value = item.nama;
              deskripsiInput.value = item.deskripsi || "";
              setStatus(`Mode edit ID ${item.id}`);
            },
          );

          tr.querySelector('[data-action="delete"]')?.addEventListener(
            "click",
            async () => {
              if (!confirm(`Hapus program ${item.nama}?`)) {
                return;
              }
              try {
                await fetchJSON(`${endpoint}/${item.id}`, { method: "DELETE" });
                setStatus("Data berhasil dihapus");
                if (Number(idInput.value) === item.id) {
                  resetForm();
                }
                await loadList();
              } catch (error) {
                setStatus(error.message, true);
              }
            },
          );

          return tr;
        }

        async function loadList() {
          tableBody.innerHTML =
            '<tr><td colspan="6" class="text-center text-muted py-4">Memuat...</td></tr>';
          try {
            const params = new URLSearchParams();
            const q = queryInput.value.trim();
            if (q) {
              params.set("q", q);
            }
            const url = params.toString()
              ? `${endpoint}?${params.toString()}`
              : endpoint;
            const data = await fetchJSON(url);
            const items = Array.isArray(data?.items)
              ? data.items.map(normalizeItem)
              : [];

            tableBody.innerHTML = "";
            if (items.length === 0) {
              tableBody.innerHTML =
                '<tr><td colspan="6" class="text-center text-muted py-4">Belum ada data</td></tr>';
            } else {
              items.forEach((item) => tableBody.appendChild(rowTemplate(item)));
            }
            metaText.textContent = `Total ${items.length} data`;
          } catch (error) {
            tableBody.innerHTML =
              '<tr><td colspan="6" class="text-center text-danger py-4">Gagal memuat data</td></tr>';
            setStatus(error.message, true);
          }
        }

        form.addEventListener("submit", async (event) => {
          event.preventDefault();

          if (!canMutateByRole(currentUserRole)) {
            setStatus("Anda tidak memiliki hak akses untuk menyimpan perubahan", true);
            return;
          }

          const payload = {
            kode: kodeInput.value.trim(),
            nama: namaInput.value.trim(),
            deskripsi: deskripsiInput.value.trim(),
          };

          if (!payload.kode || !payload.nama) {
            setStatus("Kode dan nama wajib diisi", true);
            return;
          }

          const id = idInput.value.trim();
          const isEdit = Boolean(id);
          const url = isEdit ? `${endpoint}/${id}` : endpoint;
          const method = isEdit ? "PUT" : "POST";

          try {
            const request = {
              method,
              headers: { "Content-Type": "application/json" },
            };

            request.body = JSON.stringify(payload);
            await fetchJSON(url, request);

            setStatus(
              isEdit ? "Data berhasil diperbarui" : "Data berhasil disimpan",
            );
            resetForm();
            await loadList();
          } catch (error) {
            if (/unit_pengusul_id\s+is\s+required/i.test(error.message)) {
              try {
                const unitID = await resolveDefaultUnitPengusulId();
                await fetchJSON(url, {
                  method,
                  headers: { "Content-Type": "application/json" },
                  body: JSON.stringify({
                    ...payload,
                    unit_pengusul_id: unitID,
                  }),
                });

                setStatus(
                  isEdit
                    ? "Data berhasil diperbarui"
                    : "Data berhasil disimpan",
                );
                resetForm();
                await loadList();
                return;
              } catch (retryError) {
                setStatus(retryError.message, true);
                return;
              }
            }

            setStatus(error.message, true);
          }
        });

        btnSearch.addEventListener("click", () => {
          loadList();
        });

        queryInput.addEventListener("keydown", (event) => {
          if (event.key === "Enter") {
            event.preventDefault();
            loadList();
          }
        });

        btnReset.addEventListener("click", () => {
          resetForm();
          setStatus("Form direset");
        });

        async function loadCurrentUser() {
          try {
            const token =
              localStorage.getItem("AUTH_TOKEN") ||
              localStorage.getItem("authToken") ||
              "";
            if (!token) return;
            const res = await fetch("/api/v1/auth/me", {
              headers: { Authorization: `Bearer ${token}` },
            });
            if (!res.ok) return;
            const body = await res.json();
            currentUserRole = normalizeRole(body?.data?.role ?? "");
          } catch (_) {
            // non-fatal: fallback to read-only
          }
        }

        loadCurrentUser().then(() => {
          applyRoleAccess();
          loadList();
        });
      })();
    </script>
    <script src="/assets/js/auth-client.js?v=20260326"></script>
  </body>
</html>
