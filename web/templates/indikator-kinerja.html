<!doctype html>
<html lang="id">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Indikator Rencana Kerja - E-Planning RSUD AI</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link href="/assets/css/app.css" rel="stylesheet" />
  </head>
  <body
    class="bg-soft-pattern"
    data-module-name="Indikator Rencana Kerja"
    data-api-endpoint="/api/v1/indikator_rencana_kerja"
  >
    <main class="container py-4">
      <header
        class="mb-4 p-4 card shadow-sm border-0 header-gradient text-white"
      >
        <h1 class="h3 mb-1" id="module-title">CRUD</h1>
        <p class="mb-0 opacity-75">
          Kelola data Rencana Aksi Kerja secara terpisah
        </p>
      </header>

      <div class="row g-4">
        <section class="col-lg-4" aria-label="Form Rencana Aksi">
          <div class="card border-0 shadow-sm">
            <div class="card-body">
              <h2 class="h6 text-uppercase text-muted">Form Data</h2>
              <form id="crud-form" class="vstack gap-2" autocomplete="off">
                <input type="hidden" id="entity-id" />

                <label class="form-label mb-0" for="rencanaKerjaId"
                  >Rencana Kerja</label
                >
                <select id="rencanaKerjaId" class="form-select" required>
                  <option value="">Pilih rencana kerja</option>
                </select>

                <label class="form-label mb-0" for="kode">Kode</label>
                <input
                  id="kode"
                  class="form-control"
                  placeholder="IRK-001"
                  required
                />

                <label class="form-label mb-0" for="nama">Nama</label>
                <textarea
                  id="nama"
                  class="form-control"
                  placeholder="Nama Rencana Aksi Rencana Kerja"
                  required
                ></textarea>

                <label class="form-label mb-0" for="satuan">Satuan</label>
                <input id="satuan" class="form-control" placeholder="%" />

                <label class="form-label mb-0" for="targetTahunan"
                  >Target Tahunan</label
                >
                <input
                  id="targetTahunan"
                  type="number"
                  step="0.01"
                  class="form-control"
                  value="0"
                />

                <label class="form-label mb-0" for="hargaSatuan"
                  >Harga Satuan</label
                >
                <input
                  id="hargaSatuan"
                  type="number"
                  step="0.01"
                  class="form-control"
                  value="0"
                />

                <label class="form-label mb-0" for="anggaranTahunan"
                  >Anggaran Tahunan</label
                >
                <input
                  id="anggaranTahunan"
                  type="number"
                  step="0.01"
                  class="form-control"
                  value="0"
                />

                <div class="d-flex gap-2 mt-2">
                  <button type="submit" class="btn btn-primary">Simpan</button>
                  <button
                    type="button"
                    id="btn-reset"
                    class="btn btn-outline-secondary"
                  >
                    Reset
                  </button>
                </div>
                <small id="status-text" class="text-muted" aria-live="polite"
                  >Siap</small
                >
              </form>
            </div>
          </div>
        </section>

        <section class="col-lg-8" aria-label="Daftar Indikator Rencana Kerja">
          <div class="card border-0 shadow-sm">
            <div class="card-body">
              <div
                class="d-flex justify-content-between align-items-center mb-3"
              >
                <h2 class="h6 text-uppercase text-muted mb-0">Daftar Data</h2>
                <a href="/ui/dashboard" class="btn btn-sm btn-outline-dark"
                  >Kembali ke Dashboard</a
                >
              </div>
              <div class="row g-2 mb-3">
                <div class="col-md-8">
                  <input
                    id="query"
                    class="form-control"
                    placeholder="Cari nama atau kode"
                    aria-label="Cari nama atau kode"
                  />
                </div>
                <div class="col-md-4 d-grid">
                  <button
                    id="btn-search"
                    type="button"
                    class="btn btn-outline-primary"
                  >
                    Cari / Refresh
                  </button>
                </div>
              </div>
              <div class="table-responsive">
                <table class="table table-striped table-hover align-middle">
                  <caption class="visually-hidden">
                    Tabel data Indikator Rencana Kerja
                  </caption>
                  <thead>
                    <tr>
                      <th scope="col" style="width: 1%; white-space: nowrap">
                        ID
                      </th>
                      <th scope="col">Rencana Kerja</th>
                      <th scope="col">Kode</th>
                      <th scope="col">Nama</th>
                      <th scope="col">Satuan</th>
                      <th scope="col">Target Tahunan</th>
                      <th scope="col">Harga Satuan</th>
                      <th scope="col">Anggaran Tahunan</th>
                      <th scope="col">Aksi</th>
                    </tr>
                  </thead>
                  <tbody id="table-body"></tbody>
                </table>
              </div>

              <div
                class="d-flex justify-content-between align-items-center mt-2"
              >
                <small id="meta-text" class="text-muted">Total 0 data</small>
              </div>
            </div>
          </div>
        </section>
      </div>
    </main>

    <script src="/assets/js/indikator-kinerja.js"></script>
    <script src="/assets/js/auth-client.js"></script>
  </body>
</html>
