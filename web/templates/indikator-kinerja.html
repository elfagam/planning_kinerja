<!doctype html>
<html lang="id">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Indikator Rencana Kerja - E-Planning RSUD AI</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link href="/assets/css/app.css" rel="stylesheet" />
  </head>
  <body
    class="bg-soft-pattern"
    data-module-name="Indikator Rencana Kerja"
    data-api-endpoint="/api/v1/indikator_rencana_kerja"
  >
    <main class="container py-4">
      <header
        class="mb-4 p-4 card shadow-sm border-0 header-gradient text-white"
      >
        <h1 class="h3 mb-1" id="module-title">CRUD</h1>
        <p class="mb-0 opacity-75">
          Kelola data Rencana Aksi Kerja secara terpisah
        </p>
      </header>

      <div class="row g-4">
        <section class="col-lg-4" aria-label="Form Rencana Aksi">
          <div class="card border-0 shadow-sm">
            <div class="card-body">
              <h2 class="h6 text-uppercase text-muted">Form Data</h2>
              <form id="crud-form" class="vstack gap-2" autocomplete="off">
                <input type="hidden" id="entity-id" />

                <label class="form-label mb-0" for="rencanaKerjaId"
                  >Rencana Kerja</label
                >
                <select id="rencanaKerjaId" class="form-select" required>
                  <option value="">Pilih rencana kerja</option>
                </select>

                <label class="form-label mb-0" for="kode">Kode</label>
                <input
                  id="kode"
                  class="form-control"
                  placeholder="IRK-001"
                  required
                />

                <label class="form-label mb-0" for="nama">Nama</label>
                <textarea
                  id="nama"
                  class="form-control"
                  placeholder="Nama Rencana Aksi Rencana Kerja"
                  required
                ></textarea>

                <label class="form-label mb-0" for="satuan">Satuan</label>
                <input id="satuan" class="form-control" placeholder="%" />

                <label class="form-label mb-0" for="targetTahunan"
                  >Target Tahunan</label
                >
                <input
                  id="targetTahunan"
                  type="number"
                  step="0.01"
                  class="form-control"
                  value="0"
                />

                <label class="form-label mb-0" for="anggaranTahunan"
                  >Anggaran Tahunan</label
                >
                <input
                  id="anggaranTahunan"
                  type="number"
                  step="0.01"
                  class="form-control"
                  value="0"
                />

                <div class="d-flex gap-2 mt-2">
                  <button type="submit" class="btn btn-primary">Simpan</button>
                  <button
                    type="button"
                    id="btn-reset"
                    class="btn btn-outline-secondary"
                  >
                    Reset
                  </button>
                </div>
                <small id="status-text" class="text-muted" aria-live="polite"
                  >Siap</small
                >
              </form>
            </div>
          </div>
        </section>

        <section class="col-lg-8" aria-label="Daftar Indikator Rencana Kerja">
          <div class="card border-0 shadow-sm">
            <div class="card-body">
              <div
                class="d-flex justify-content-between align-items-center mb-3"
              >
                <h2 class="h6 text-uppercase text-muted mb-0">Daftar Data</h2>
                <a href="/ui/dashboard" class="btn btn-sm btn-outline-dark"
                  >Kembali ke Dashboard</a
                >
              </div>
              <div class="row g-2 mb-3">
                <div class="col-md-8">
                  <input
                    id="query"
                    class="form-control"
                    placeholder="Cari nama atau kode"
                    aria-label="Cari nama atau kode"
                  />
                </div>
                <div class="col-md-4 d-grid">
                  <button
                    id="btn-search"
                    type="button"
                    class="btn btn-outline-primary"
                  >
                    Cari / Refresh
                  </button>
                </div>
              </div>
              <div class="table-responsive">
                <table class="table table-striped table-hover align-middle">
                  <caption class="visually-hidden">
                    Tabel data Indikator Rencana Kerja
                  </caption>
                  <thead>
                    <tr>
                      <th scope="col">ID</th>
                      <th scope="col">Rencana Kerja</th>
                      <th scope="col">Kode</th>
                      <th scope="col">Nama</th>
                      <th scope="col">Satuan</th>
                      <th scope="col">Target Tahunan</th>
                      <th scope="col">Anggaran Tahunan</th>
                      <th scope="col">Aksi</th>
                    </tr>
                  </thead>
                  <tbody id="table-body"></tbody>
                </table>
              </div>
              <div
                class="d-flex justify-content-between align-items-center mt-2"
              >
                <small id="meta-text" class="text-muted">Total 0 data</small>
              </div>
            </div>
          </div>
        </section>
      </div>
    </main>

    <script>
      (() => {
        const endpoint = document.body.dataset.apiEndpoint;
        const rencanaKerjaEndpoint = "/api/v1/rencana_kerja";

        const form = document.getElementById("crud-form");
        const idInput = document.getElementById("entity-id");
        const rencanaKerjaInput = document.getElementById("rencanaKerjaId");
        const kodeInput = document.getElementById("kode");
        const namaInput = document.getElementById("nama");
        const satuanInput = document.getElementById("satuan");
        const targetTahunanInput = document.getElementById("targetTahunan");
        const anggaranTahunanInput = document.getElementById("anggaranTahunan");
        const statusText = document.getElementById("status-text");
        const queryInput = document.getElementById("query");
        const btnSearch = document.getElementById("btn-search");
        const btnReset = document.getElementById("btn-reset");
        const tableBody = document.getElementById("table-body");
        const metaText = document.getElementById("meta-text");

        const rencanaKerjaMap = new Map();
        let currentListItems = [];

        const MUTATION_ROLES = new Set(["ADMIN", "OPERATOR", "PERENCANA"]);
        let currentUserRole = "";

        function normalizeRole(raw) {
          return String(raw || "")
            .trim()
            .toUpperCase();
        }

        function canMutateByRole(role) {
          return MUTATION_ROLES.has(normalizeRole(role));
        }

        function applyRoleAccess() {
          if (canMutateByRole(currentUserRole)) return;
          form
            .querySelectorAll("input, textarea, select, button[type='submit']")
            .forEach((el) => {
              el.disabled = true;
            });
          const info = document.createElement("p");
          info.className = "text-warning small mt-2 mb-0";
          info.textContent =
            "Mode baca saja — role Anda tidak memiliki hak untuk mengubah data.";
          form.appendChild(info);
        }
        function authHeader() {
          const token =
            localStorage.getItem("AUTH_TOKEN") ||
            localStorage.getItem("authToken") ||
            "";
          return token ? { Authorization: `Bearer ${token}` } : {};
        }

        function setStatus(message, isError = false) {
          statusText.textContent = message;
          statusText.className = isError
            ? "text-danger small"
            : "text-success small";
        }

        function normalizeRencanaKerja(raw) {
          return {
            id: Number(raw.id ?? raw.ID ?? 0),
            kode: raw.kode ?? raw.Kode ?? "",
            nama: raw.nama ?? raw.Nama ?? "",
          };
        }

        function normalizeItem(raw) {
          return {
            id: Number(raw.id ?? raw.ID ?? 0),
            rencanaKerjaId: Number(
              raw.rencana_kerja_id ?? raw.RencanaKerjaID ?? 0,
            ),
            kode: raw.kode ?? raw.Kode ?? "",
            nama: raw.nama ?? raw.Nama ?? "",
            satuan: raw.satuan ?? raw.Satuan ?? "",
            targetTahunan: Number(raw.target_tahunan ?? raw.TargetTahunan ?? 0),
            anggaranTahunan: Number(
              raw.anggaran_tahunan ?? raw.AnggaranTahunan ?? 0,
            ),
          };
        }

        async function fetchJSON(url, options = {}) {
          const res = await fetch(url, {
            ...options,
            headers: {
              ...(options.headers || {}),
              ...authHeader(),
            },
          });

          const body = await res.json();
          if (!res.ok || !body.success) {
            throw new Error(body.error || `HTTP ${res.status}`);
          }
          return body.data;
        }

        function isDuplicateKode(kode, editingID) {
          const normalizedKode = String(kode || "")
            .trim()
            .toLowerCase();
          if (!normalizedKode) {
            return false;
          }

          return currentListItems.some((item) => {
            const itemID = Number(item.id || 0);
            if (editingID > 0 && itemID === editingID) {
              return false;
            }

            return (
              String(item.kode || "")
                .trim()
                .toLowerCase() === normalizedKode
            );
          });
        }

        function suggestNextKode() {
          let maxNumber = 0;
          let padWidth = 3;

          currentListItems.forEach((item) => {
            const kode = String(item.kode || "").trim();
            const match = /^IRK-(\d+)$/i.exec(kode);
            if (!match) {
              return;
            }

            const numberPart = match[1];
            const parsed = Number(numberPart);
            if (Number.isFinite(parsed) && parsed > maxNumber) {
              maxNumber = parsed;
              padWidth = Math.max(padWidth, numberPart.length);
            }
          });

          return `IRK-${String(maxNumber + 1).padStart(padWidth, "0")}`;
        }

        function resetForm() {
          idInput.value = "";
          rencanaKerjaInput.value = "";
          kodeInput.value = suggestNextKode();
          namaInput.value = "";
          satuanInput.value = "";
          targetTahunanInput.value = "0";
          anggaranTahunanInput.value = "0";
        }

        function rencanaKerjaLabel(id) {
          return rencanaKerjaMap.get(Number(id)) || `Rencana Kerja #${id}`;
        }

        function rowTemplate(item) {
          const tr = document.createElement("tr");
          tr.innerHTML = `
            <td>${item.id}</td>
            <td>${rencanaKerjaLabel(item.rencanaKerjaId)}</td>
            <td>${item.kode}</td>
            <td>${item.nama}</td>
            <td>${item.satuan || "-"}</td>
            <td>${item.targetTahunan.toFixed(2)}</td>
            <td>${item.anggaranTahunan.toFixed(2)}</td>
            <td class="text-nowrap">
              ${canMutateByRole(currentUserRole) ? '<button class="btn btn-sm btn-outline-primary me-1" data-action="edit">Edit</button><button class="btn btn-sm btn-outline-danger" data-action="delete">Hapus</button>' : '<span class="text-muted small">Read-only</span>'}
            </td>
          `;

          tr.querySelector('[data-action="edit"]')?.addEventListener(
            "click",
            () => {
              idInput.value = item.id;
              rencanaKerjaInput.value = String(item.rencanaKerjaId);
              kodeInput.value = item.kode;
              namaInput.value = item.nama;
              satuanInput.value = item.satuan;
              targetTahunanInput.value = String(item.targetTahunan);
              anggaranTahunanInput.value = String(item.anggaranTahunan);
              setStatus(`Mode edit ID ${item.id}`);
            },
          );

          tr.querySelector('[data-action="delete"]')?.addEventListener(
            "click",
            async () => {
              if (!confirm(`Hapus Rencana Aksi rencana kerja ${item.nama}?`)) {
                return;
              }
              try {
                await fetchJSON(`${endpoint}/${item.id}`, { method: "DELETE" });
                setStatus("Data berhasil dihapus");
                if (Number(idInput.value) === item.id) {
                  resetForm();
                }
                await loadList();
              } catch (error) {
                setStatus(error.message, true);
              }
            },
          );

          return tr;
        }

        async function loadRencanaKerjaOptions() {
          try {
            const data = await fetchJSON(rencanaKerjaEndpoint);
            const items = (Array.isArray(data?.items) ? data.items : [])
              .map(normalizeRencanaKerja)
              .sort((a, b) => a.id - b.id);

            rencanaKerjaMap.clear();
            rencanaKerjaInput.innerHTML =
              '<option value="">Pilih rencana kerja</option>';

            items.forEach((item) => {
              const label = `${item.kode} - ${item.nama}`;
              rencanaKerjaMap.set(item.id, label);

              const option = document.createElement("option");
              option.value = String(item.id);
              option.textContent = label;
              rencanaKerjaInput.appendChild(option);
            });
          } catch (error) {
            setStatus(
              `Pilihan rencana kerja tidak ditemukan: ${error.message}`,
              true,
            );
          }
        }

        async function loadList() {
          tableBody.innerHTML =
            '<tr><td colspan="8" class="text-center text-muted py-4">Memuat...</td></tr>';

          try {
            const params = new URLSearchParams();
            const q = queryInput.value.trim();
            const selectedRencanaKerjaID = Number(rencanaKerjaInput.value || 0);
            if (q) {
              params.set("q", q);
            }

            const url = params.size
              ? `${endpoint}?${params.toString()}`
              : endpoint;

            const data = await fetchJSON(url);
            const allItems = (Array.isArray(data?.items) ? data.items : []).map(
              normalizeItem,
            );
            currentListItems = allItems;
            const items = selectedRencanaKerjaID
              ? allItems.filter(
                  (item) => item.rencanaKerjaId === selectedRencanaKerjaID,
                )
              : [];

            tableBody.innerHTML = "";
            metaText.textContent = `Total ${items.length} data`;

            if (items.length === 0) {
              tableBody.innerHTML = selectedRencanaKerjaID
                ? '<tr><td colspan="8" class="text-center text-muted py-4">Belum ada data</td></tr>'
                : '<tr><td colspan="8" class="text-center text-muted py-4">Pilih rencana kerja terlebih dahulu</td></tr>';
              return;
            }

            items
              .sort((a, b) => a.id - b.id)
              .forEach((item) => tableBody.appendChild(rowTemplate(item)));
          } catch (error) {
            tableBody.innerHTML =
              '<tr><td colspan="8" class="text-center text-danger py-4">Gagal memuat data</td></tr>';
            setStatus(error.message, true);
          }
        }

        form.addEventListener("submit", async (event) => {
          event.preventDefault();

          if (!canMutateByRole(currentUserRole)) {
            setStatus(
              "Anda tidak memiliki hak akses untuk menyimpan perubahan",
              true,
            );
            return;
          }

          const payload = {
            rencana_kerja_id: Number(rencanaKerjaInput.value),
            kode: kodeInput.value.trim(),
            nama: namaInput.value.trim(),
            satuan: satuanInput.value.trim(),
            target_tahunan: Number(targetTahunanInput.value || 0),
            anggaran_tahunan: Number(anggaranTahunanInput.value || 0),
          };

          if (!payload.rencana_kerja_id || !payload.kode || !payload.nama) {
            setStatus("Rencana Kerja, kode, dan nama wajib diisi", true);
            return;
          }

          const id = idInput.value.trim();
          const editingID = id ? Number(id) : 0;
          if (isDuplicateKode(payload.kode, editingID)) {
            const suggestedKode = suggestNextKode();
            kodeInput.value = suggestedKode;
            setStatus(
              `Kode indikator_rencana_kerja sudah digunakan. Saran kode: ${suggestedKode}`,
              true,
            );
            kodeInput.focus();
            return;
          }

          const isEdit = Boolean(idInput.value);
          const url = isEdit ? `${endpoint}/${idInput.value}` : endpoint;
          const method = isEdit ? "PUT" : "POST";

          try {
            await fetchJSON(url, {
              method,
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify(payload),
            });

            setStatus(
              isEdit ? "Data berhasil diperbarui" : "Data berhasil ditambahkan",
            );
            resetForm();
            await loadList();
          } catch (error) {
            if (
              String(error.message || "")
                .toLowerCase()
                .includes("kode indikator_rencana_kerja sudah digunakan")
            ) {
              const suggestedKode = suggestNextKode();
              kodeInput.value = suggestedKode;
              setStatus(
                `Kode indikator_rencana_kerja sudah digunakan. Saran kode: ${suggestedKode}`,
                true,
              );
              kodeInput.focus();
              return;
            }
            setStatus(error.message, true);
          }
        });

        btnReset.addEventListener("click", () => {
          resetForm();
          setStatus("Form direset");
        });

        btnSearch.addEventListener("click", loadList);
        rencanaKerjaInput.addEventListener("change", () => {
          loadList();
        });
        queryInput.addEventListener("keydown", (event) => {
          if (event.key === "Enter") {
            event.preventDefault();
            loadList();
          }
        });

        async function loadCurrentUser() {
          try {
            const token =
              localStorage.getItem("AUTH_TOKEN") ||
              localStorage.getItem("authToken") ||
              "";
            if (!token) return;
            const res = await fetch("/api/v1/auth/me", {
              headers: { Authorization: `Bearer ${token}` },
            });
            if (!res.ok) return;
            const body = await res.json();
            currentUserRole = normalizeRole(body?.data?.role ?? "");
          } catch (_) {
            // non-fatal
          }
        }

        (async () => {
          await loadCurrentUser();
          applyRoleAccess();
          await loadRencanaKerjaOptions();
          await loadList();
          setStatus("Data siap dikelola");
        })();
      })();
    </script>
    <script src="/assets/js/auth-client.js"></script>
  </body>
</html>
