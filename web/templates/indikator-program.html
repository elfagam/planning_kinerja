<!doctype html>
<html lang="id">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Indikator Program - E-Planning RSUD</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link href="/assets/css/app.css" rel="stylesheet" />
    <script src="/assets/js/auth-client.js?v=20260326"></script>
  </head>
  <body
    class="bg-soft-pattern"
    data-module-name="Indikator Program"
    data-api-endpoint="/api/v1/indikator_program"
  >
    <main class="container py-4">
      <header
        class="mb-4 p-4 card shadow-sm border-0 header-gradient text-white"
      >
        <h1 class="h3 mb-1" id="module-title">CRUD PROGRAM DAN INDIKATOR</h1>
        <p class="mb-0 opacity-75">
          Kelola data Indikator Program secara terpisah
        </p>
      </header>

      <div class="row g-4">
        <section class="col-lg-4" aria-label="Form Indikator Program">
          <div class="card border-0 shadow-sm">
            <div class="card-body">
              <h2 class="h6 text-uppercase text-muted">Form Data</h2>
              <form id="crud-form" class="vstack gap-2" autocomplete="off">
                <input type="hidden" id="entity-id" />

                <label class="form-label mb-0" for="sasaranId">Sasaran</label>
                <select id="sasaranId" class="form-select" required>
                  <option value="">Pilih sasaran</option>
                </select>

                <label class="form-label mb-0" for="programId">Program</label>
                <select id="programId" class="form-select" required>
                  <option value="">Pilih program</option>
                </select>

                <label class="form-label mb-0" for="kode">Kode</label>
                <input
                  id="kode"
                  class="form-control"
                  placeholder="IP-001"
                  required
                />

                <label class="form-label mb-0" for="nama">Nama</label>
                <textarea
                  id="nama"
                  class="form-control"
                  placeholder="Nama indikator program"
                  required
                ></textarea>

                <label class="form-label mb-0" for="formula">Formula</label>
                <textarea
                  id="formula"
                  class="form-control"
                  rows="3"
                  placeholder="Contoh: (jumlah capaian / jumlah target) x 100"
                ></textarea>

                <label class="form-label mb-0" for="satuan">Satuan</label>
                <input id="satuan" class="form-control" placeholder="%" />

                <label class="form-label mb-0" for="baseline">Baseline</label>
                <input
                  id="baseline"
                  type="number"
                  step="0.01"
                  class="form-control"
                  value="0"
                />

                <div class="d-flex gap-2 mt-2">
                  <button type="submit" class="btn btn-primary">Simpan</button>
                  <button
                    type="button"
                    id="btn-reset"
                    class="btn btn-outline-secondary"
                  >
                    Reset
                  </button>
                </div>

                <small id="status-text" class="text-muted" aria-live="polite"
                  >Siap</small
                >
              </form>
            </div>
          </div>
        </section>

        <section class="col-lg-8" aria-label="Daftar Indikator Program">
          <div class="card border-0 shadow-sm">
            <div class="card-body">
              <div
                class="d-flex justify-content-between align-items-center mb-3"
              >
                <h2 class="h6 text-uppercase text-muted mb-0">Daftar Data</h2>
                <a href="/ui/dashboard" class="btn btn-sm btn-outline-dark"
                  >Kembali ke Dashboard</a
                >
              </div>

              <div class="row g-2 mb-3">
                <div class="col-md-8">
                  <input
                    id="query"
                    class="form-control"
                    placeholder="Cari nama atau kode"
                    aria-label="Cari nama atau kode"
                  />
                </div>
                <div class="col-md-4 d-grid">
                  <button
                    id="btn-search"
                    type="button"
                    class="btn btn-outline-primary"
                  >
                    Cari / Refresh
                  </button>
                </div>
              </div>

              <div class="table-responsive">
                <table class="table table-striped table-hover align-middle">
                  <caption class="visually-hidden">
                    Tabel data Indikator Program
                  </caption>
                  <thead>
                    <tr>
                      <th scope="col">ID</th>
                      <th scope="col">Sasaran</th>
                      <th scope="col">Program</th>
                      <th scope="col">Kode</th>
                      <th scope="col">Nama</th>
                      <th scope="col">Formula</th>
                      <th scope="col">Satuan</th>
                      <th scope="col">Baseline</th>
                      <th scope="col">Aksi</th>
                    </tr>
                  </thead>
                  <tbody id="table-body"></tbody>
                </table>
              </div>

              <div
                class="d-flex justify-content-between align-items-center mt-2"
              >
                <small id="meta-text" class="text-muted">Total 0 data</small>
              </div>
            </div>
          </div>
        </section>
      </div>
    </main>

    <script>
      (() => {
        const endpoint = document.body.dataset.apiEndpoint;
        const programEndpoint = "/api/v1/program";
        const form = document.getElementById("crud-form");
        const idInput = document.getElementById("entity-id");
        const programIdInput = document.getElementById("programId");
        const kodeInput = document.getElementById("kode");
        const namaInput = document.getElementById("nama");
        const formulaInput = document.getElementById("formula");
        const satuanInput = document.getElementById("satuan");
        const baselineInput = document.getElementById("baseline");
        const sasaranIdInput = document.getElementById("sasaranId");
        const statusText = document.getElementById("status-text");
        const queryInput = document.getElementById("query");
        const btnSearch = document.getElementById("btn-search");
        const btnReset = document.getElementById("btn-reset");
        const tableBody = document.getElementById("table-body");
        const metaText = document.getElementById("meta-text");

        const programMap = new Map();
        const sasaranMap = new Map();

        const MUTATION_ROLES = new Set(["ADMIN", "PERENCANA", "OPERATOR"]);
        let currentUserRole = "";

        function normalizeRole(raw) {
          return String(raw || "").trim().toUpperCase();
        }

        function canMutateByRole(role) {
          return MUTATION_ROLES.has(normalizeRole(role));
        }

        function applyRoleAccess() {
          if (canMutateByRole(currentUserRole)) return;
          form.querySelectorAll("input, textarea, select, button[type='submit']").forEach((el) => {
            el.disabled = true;
          });
          const info = document.createElement("p");
          info.className = "text-warning small mt-2 mb-0";
          info.textContent = "Mode baca saja — role Anda tidak memiliki hak untuk mengubah data.";
          form.appendChild(info);
        }
        function authHeader() {
          const token =
            localStorage.getItem("AUTH_TOKEN") ||
            localStorage.getItem("authToken") ||
            "";
          return token ? { Authorization: `Bearer ${token}` } : {};
        }

        function setStatus(message, isError = false) {
          statusText.textContent = message;
          statusText.className = isError
            ? "text-danger small"
            : "text-success small";
        }

        function normalizeProgram(raw) {
          return {
            id: Number(raw.id ?? raw.ID ?? 0),
            kode: raw.kode ?? raw.Kode ?? "",
            nama: raw.nama ?? raw.Nama ?? "",
          };
        }

        function normalizeItem(raw) {
          return {
            id: Number(raw.id ?? raw.ID ?? 0),
            programId: Number(raw.program_id ?? raw.ProgramID ?? 0),
            kode: raw.kode ?? raw.Kode ?? "",
            nama: raw.nama ?? raw.Nama ?? "",
            formula: raw.formula ?? raw.Formula ?? "",
            satuan: raw.satuan ?? raw.Satuan ?? "",
            baseline: Number(raw.baseline ?? raw.Baseline ?? 0),
            sasaranId: Number(raw.sasaran_id ?? raw.SasaranID ?? 0),
          };
        }


        function resetForm() {
          idInput.value = "";
          programIdInput.value = "";
          kodeInput.value = "";
          namaInput.value = "";
          formulaInput.value = "";
          satuanInput.value = "";
          baselineInput.value = "0";
          sasaranIdInput.value = "";
        }

        function programLabel(programId) {
          return programMap.get(Number(programId)) || `Program #${programId}`;
        }

        function rowTemplate(item) {
          const tr = document.createElement("tr");
          const sasaranNama =
            sasaranMap.get(Number(item.sasaranId)) ||
            `Sasaran #${item.sasaranId}`;
          const programNama =
            programMap.get(Number(item.programId)) ||
            `Program #${item.programId}`;
          tr.innerHTML = `
            <td>${item.id}</td>
            <td>${sasaranNama}</td>
            <td>${programNama}</td>
            <td>${item.kode}</td>
            <td>${item.nama}</td>
            <td>${item.formula || "-"}</td>
            <td>${item.satuan || "-"}</td>
            <td>${item.baseline ?? 0}</td>
            <td class="text-nowrap">
              ${canMutateByRole(currentUserRole) ? '<button class="btn btn-sm btn-outline-primary me-1" data-action="edit">Edit</button><button class="btn btn-sm btn-outline-danger" data-action="delete">Hapus</button>' : '<span class="text-muted small">Read-only</span>'}
            </td>
          `;

          tr.querySelector('[data-action="edit"]')?.addEventListener(
            "click",
            () => {
              idInput.value = item.id;
              programIdInput.value = String(item.programId);
              kodeInput.value = item.kode;
              namaInput.value = item.nama;
              formulaInput.value = item.formula;
              satuanInput.value = item.satuan;
              baselineInput.value = String(item.baseline);
              sasaranIdInput.value = String(item.sasaranId);
              setStatus(`Mode edit ID ${item.id}`);
            },
          );

          tr.querySelector('[data-action="delete"]')?.addEventListener(
            "click",
            async () => {
              if (!confirm(`Hapus indikator program ${item.nama}?`)) {
                return;
              }

              try {
                await fetchJSON(`${endpoint}/${item.id}`, { method: "DELETE" });
                setStatus("Data berhasil dihapus");
                if (Number(idInput.value) === item.id) {
                  resetForm();
                }
                await loadList();
              } catch (error) {
                setStatus(error.message, true);
              }
            },
          );

          return tr;
        }

        async function loadProgramOptions() {
          try {
            const data = await fetchJSON(programEndpoint);
            const programs = Array.isArray(data?.items) ? data.items : [];

            programMap.clear();
            programIdInput.innerHTML =
              '<option value="">Pilih program</option>';

            programs
              .map(normalizeProgram)
              .sort((a, b) => a.id - b.id)
              .forEach((item) => {
                const label = `${item.kode} - ${item.nama}`;
                programMap.set(item.id, label);

                const option = document.createElement("option");
                option.value = String(item.id);
                option.textContent = label;
                programIdInput.appendChild(option);
              });
          } catch (error) {
            setStatus(
              `Pilihan program tidak ditemukan: ${error.message}`,
              true,
            );
          }
        }

        const sasaranEndpoint = "/api/v1/sasaran";

        async function loadSasaranOptions() {
          try {
            const data = await fetchJSON(sasaranEndpoint);
            const items = Array.isArray(data?.items) ? data.items : [];
            sasaranIdInput.innerHTML =
              '<option value="">Pilih sasaran</option>';
            sasaranMap.clear();
            items.forEach((raw) => {
              const id = Number(raw.id ?? raw.ID);
              const nama = raw.nama ?? raw.Nama;
              sasaranMap.set(id, nama);
              sasaranIdInput.innerHTML += `<option value="${id}">${nama}</option>`;
            });
          } catch (error) {
            setStatus("Gagal memuat data sasaran", true);
          }
        }

        async function loadList() {
          tableBody.innerHTML =
            '<tr><td colspan="8" class="text-center text-muted py-4">Memuat...</td></tr>';
          try {
            const params = new URLSearchParams();
            const q = queryInput.value.trim();
            if (q) {
              params.set("q", q);
            }

            const url = params.size
              ? `${endpoint}?${params.toString()}`
              : endpoint;
            const data = await fetchJSON(url);
            const items = (Array.isArray(data?.items) ? data.items : []).map(
              normalizeItem,
            );

            tableBody.innerHTML = "";
            metaText.textContent = `Total ${items.length} data`;

            if (items.length === 0) {
              tableBody.innerHTML =
                '<tr><td colspan="8" class="text-center text-muted py-4">Belum ada data</td></tr>';
              return;
            }

            items
              .sort((a, b) => a.id - b.id)
              .forEach((item) => tableBody.appendChild(rowTemplate(item)));
          } catch (error) {
            tableBody.innerHTML =
              '<tr><td colspan="8" class="text-center text-danger py-4">Gagal memuat data</td></tr>';
            setStatus(error.message, true);
          }
        }

        form.addEventListener("submit", async (event) => {
          event.preventDefault();

          if (!canMutateByRole(currentUserRole)) {
            setStatus("Anda tidak memiliki hak akses untuk menyimpan perubahan", true);
            return;
          }

          const payload = {
            program_id: Number(programIdInput.value),
            kode: kodeInput.value.trim(),
            nama: namaInput.value.trim(),
            formula: formulaInput.value.trim(),
            satuan: satuanInput.value.trim(),
            baseline: Number(baselineInput.value || 0),
            sasaran_id: Number(sasaranIdInput.value),
          };

          const id = idInput.value.trim();
          const isEdit = id !== "";
          const url = isEdit ? `${endpoint}/${id}` : endpoint;
          const method = isEdit ? "PUT" : "POST";

          try {
            await fetchJSON(url, {
              method,
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify(payload),
            });

            setStatus(
              isEdit
                ? `Data ID ${id} diperbarui`
                : "Data baru berhasil disimpan",
            );
            resetForm();
            await loadList();
          } catch (error) {
            setStatus(error.message, true);
          }
        });

        btnReset.addEventListener("click", () => {
          resetForm();
          setStatus("Form direset");
        });

        btnSearch.addEventListener("click", () => {
          loadList();
        });

        loadProgramOptions();
        loadSasaranOptions();
        async function loadCurrentUser() {
          try {
            const token =
              localStorage.getItem("AUTH_TOKEN") ||
              localStorage.getItem("authToken") ||
              "";
            if (!token) return;
            const res = await fetch("/api/v1/auth/me", {
              headers: { Authorization: `Bearer ${token}` },
            });
            if (!res.ok) return;
            const body = await res.json();
            currentUserRole = normalizeRole(body?.data?.role ?? "");
          } catch (_) {
            // non-fatal: fallback to read-only
          }
        }

        loadCurrentUser().then(() => {
          applyRoleAccess();
          loadList();
        });
      })();
    </script>
    
  </body>
</html>
