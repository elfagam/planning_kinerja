<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Forum Tanya Jawab - E-Plan AI</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link href="/assets/css/app.css" rel="stylesheet" />
    <style>
      [v-cloak] {
        display: none;
      }
      .q-card {
        cursor: pointer;
        transition: transform 0.2s;
        border-left: 4px solid #0d6efd;
      }
      .q-card:hover {
        transform: translateX(5px);
        background-color: #f8f9fa;
      }
      .q-resolved {
        border-left-color: #198754;
        opacity: 0.8;
      }
      .thread-main {
        border-bottom: 2px solid #dee2e6;
        margin-bottom: 2rem;
        padding-bottom: 1rem;
      }
      .answer-item {
        border-left: 3px solid #dee2e6;
        padding-left: 1.5rem;
        margin-bottom: 1.5rem;
      }
      .sidebar-card {
        position: sticky;
        top: 1rem;
      }
    </style>
  </head>
  <body class="bg-light">
    <div id="app" v-cloak class="container py-4">
      <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
          <nav aria-label="breadcrumb">
            <ol class="breadcrumb mb-1">
              <li class="breadcrumb-item">
                <a href="/ui/dashboard">Dashboard</a>
              </li>
              <li class="breadcrumb-item active">Q&A Forum</li>
            </ol>
          </nav>
          <h2 class="fw-bold">Forum Tanya Jawab</h2>
        </div>
        <button
          v-if="view === 'list'"
          @click="showAskModal"
          class="btn btn-primary"
        >
          + Buat Pertanyaan
        </button>
        <button v-else @click="view = 'list'" class="btn btn-outline-secondary">
          &larr; Kembali ke Daftar
        </button>
      </div>

      <div class="row g-4">
        <div v-if="view === 'list'" class="col-lg-8">
          <div class="card mb-4 border-0 shadow-sm">
            <div class="card-body">
              <div class="row g-2">
                <div class="col-md-8">
                  <input
                    type="text"
                    v-model="filters.search"
                    @input="debounceSearch"
                    placeholder="Cari pertanyaan..."
                    class="form-control"
                    id="search"
                    name="search"
                  />
                </div>
                <div class="col-md-4">
                  <select
                    v-model="filters.status"
                    @change="fetchQuestions"
                    class="form-select"
                    id="status"
                    name="status"
                  >
                    <option value="all">Semua Status</option>
                    <option value="open">Masih Terbuka</option>
                    <option value="resolved">Selesai</option>
                  </select>
                </div>
              </div>
            </div>
          </div>

          <div v-if="loading" class="text-center py-5">
            <div class="spinner-border text-primary"></div>
          </div>

          <div
            v-else-if="questions.length === 0"
            class="text-center py-5 bg-white rounded shadow-sm"
          >
            <p class="text-muted mb-0">Tidak ada pertanyaan ditemukan.</p>
          </div>

          <div v-else class="d-flex flex-column gap-3">
            <div
              v-for="q in questions"
              :key="q.id"
              @click="showThread(q.id)"
              class="card q-card border-0 shadow-sm"
              :class="{ 'q-resolved': q.status === 'resolved' }"
            >
              <div class="card-body">
                <div
                  class="d-flex justify-content-between align-items-start mb-2"
                >
                  <h5 class="card-title mb-0 text-primary fw-semibold">
                    <span v-text="q.title"></span>
                  </h5>
                  <div class="d-flex align-items-start gap-2">
                    <span
                      :class="['badge', q.status === 'resolved' ? 'bg-success' : 'bg-warning text-dark']"
                      v-text="q.status === 'resolved' ? 'Selesai' : 'Terbuka'"
                    ></span>
                    <button
                      v-if="canDelete"
                      @click.stop="deleteQuestion(q.id)"
                      class="btn btn-sm btn-outline-danger border-0"
                      title="Hapus Pertanyaan"
                    >
                      Hapus
                    </button>
                  </div>
                </div>
                <p class="card-text text-truncate text-muted">
                  <span v-text="q.content"></span>
                </p>
                <div class="d-flex gap-3 text-muted small mt-3">
                  <span>👤 <span v-text="q.username"></span></span>
                  <span
                    >📅 <span v-text="formatDate(q.created_at)"></span
                  ></span>
                  <span>👁️ <span v-text="q.view_count"></span> Views</span>
                </div>
              </div>
            </div>

            <div
              class="d-flex justify-content-center mt-4"
              v-if="totalPages > 1"
            >
              <nav>
                <ul class="pagination">
                  <li class="page-item" :class="{ disabled: page === 1 }">
                    <a
                      class="page-link"
                      href="#"
                      @click.prevent="page--; fetchQuestions()"
                      >Prev</a
                    >
                  </li>
                  <li class="page-item">
                    <span class="page-link"
                      ><span v-text="page"></span> /
                      <span v-text="totalPages"></span
                    ></span>
                  </li>
                  <li
                    class="page-item"
                    :class="{ disabled: page === totalPages }"
                  >
                    <a
                      class="page-link"
                      href="#"
                      @click.prevent="page++; fetchQuestions()"
                      >Next</a
                    >
                  </li>
                </ul>
              </nav>
            </div>
          </div>
        </div>

        <div v-if="view === 'thread'" class="col-lg-8">
          <div
            v-if="loadingThread"
            class="text-center py-5 bg-white rounded shadow-sm"
          >
            <div class="spinner-border text-primary"></div>
          </div>
          <div v-else-if="currentThread" class="card border-0 shadow-sm">
            <div class="card-body p-4">
              <div class="thread-main">
                <div class="d-flex justify-content-between mb-3">
                  <span
                    :class="['badge', currentThread.status === 'resolved' ? 'bg-success' : 'bg-warning text-dark']"
                    v-text="currentThread.status === 'resolved' ? 'Selesai' : 'Terbuka'"
                  ></span>
                  <small class="text-muted"
                    ><span v-text="formatDate(currentThread.created_at)"></span
                  ></small>
                </div>
                <h3 class="fw-bold mb-3" v-text="currentThread.title"></h3>
                <div
                  class="mb-4 text-secondary"
                  style="white-space: pre-wrap"
                  v-text="currentThread.content"
                ></div>
                <div class="d-flex align-items-center justify-content-between">
                  <div class="text-muted small">
                    Diajukan oleh:
                    <span
                      class="fw-semibold"
                      v-text="currentThread.username"
                    ></span>
                  </div>
                  <div class="d-flex gap-2">
                    <button
                      v-if="canDelete"
                      @click="deleteQuestion(currentThread.id)"
                      class="btn btn-sm btn-outline-danger"
                    >
                      Hapus
                    </button>
                    <button
                      v-if="currentThread.status !== 'resolved'"
                      @click="resolveQuestion(currentThread.id)"
                      class="btn btn-sm btn-outline-success"
                    >
                      Tandai Selesai
                    </button>
                  </div>
                </div>
              </div>

              <h5 class="fw-bold mb-4">
                Jawaban (<span
                  v-text="currentThread.answers ? currentThread.answers.length : 0"
                ></span
                >)
              </h5>
              <div
                v-for="ans in currentThread.answers"
                :key="ans.id"
                class="answer-item"
              >
                <p
                  class="mb-3"
                  style="white-space: pre-wrap"
                  v-text="ans.content"
                ></p>
                <div v-if="ans.best_practice" class="alert alert-success border-0 bg-opacity-10 bg-success shadow-sm mb-3">
                  <div class="d-flex align-items-center mb-1 text-success">
                    <h6 class="alert-heading fw-bold mb-0 small">💡 Saran Best Practice:</h6>
                  </div>
                  <p class="mb-0 text-dark" style="font-size: 0.9rem;" v-text="ans.best_practice"></p>
                </div>
                <div class="d-flex gap-2 text-muted small">
                  <span>👤 <span v-text="ans.username"></span></span>
                  <span
                    >📅 <span v-text="formatDate(ans.created_at)"></span
                  ></span>
                </div>
              </div>

              <div class="mt-5 pt-4 border-top">
                <h6 class="fw-bold mb-3">Berikan Jawaban Anda</h6>
                <textarea
                  v-model="replyForm.content"
                  class="form-control mb-3"
                  rows="4"
                  id="reply-content"
                  name="reply-content"
                  placeholder="Ketik jawaban Anda di sini..."
                ></textarea>
                
                <h6 class="fw-bold mb-2 small text-success">💡 Saran Best Practice (Opsional)</h6>
                <textarea
                  v-model="replyForm.best_practice"
                  class="form-control mb-3"
                  rows="2"
                  id="reply-best-practice"
                  name="reply-best-practice"
                  placeholder="Masukan tips atau langkah-langkah praktis..."
                ></textarea>
                <button
                  @click="postAnswer"
                  :disabled="submittingReply || !replyForm.content"
                  class="btn btn-primary"
                >
                  Kirim Jawaban
                </button>
              </div>
            </div>
          </div>
        </div>

        <div class="col-lg-4">
          <div class="sidebar-card">
            <div class="card border-0 shadow-sm mb-4">
              <div class="card-body">
                <h5 class="fw-bold mb-3">🔥 FAQ / Populer</h5>
                <div v-for="f in faqs" :key="f.id" class="faq-item">
                  <a
                    @click.prevent="showThread(f.id)"
                    href="#"
                    class="text-decoration-none text-dark d-block"
                  >
                    <span v-text="f.title"></span>
                    <div
                      class="text-muted extra-small"
                      style="font-size: 0.75rem"
                    >
                      👁️ <span v-text="f.view_count"></span> views
                    </div>
                  </a>
                </div>
              </div>
            </div>
            <div
              class="card border-0 shadow-sm bg-primary text-white text-center py-4"
            >
              <h1 class="fw-bold mb-0" v-text="totalQuestions"></h1>
              <div class="small opacity-75">Total Pertanyaan</div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/vue@3.4.21/dist/vue.global.prod.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/assets/js/qna-app.js"></script>
  </body>
</html>
