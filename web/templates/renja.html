<!doctype html>
<html lang="id">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Renja - E-Planning RSUD</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link href="/assets/css/app.css" rel="stylesheet" />
  </head>
  <body
    class="bg-soft-pattern"
    data-module-name="Renja"
    data-api-endpoint="/api/v1/renja"
  >
    <div class="container py-4">
      <header
        class="mb-4 p-4 card shadow-sm border-0 header-gradient text-white"
      >
        <h1 class="h3 mb-1" id="module-title">CRUD</h1>
        <p class="mb-0 opacity-75">Kelola data Renja secara terpisah</p>
      </header>

      <div class="row g-4">
        <div class="col-lg-4">
          <div class="card border-0 shadow-sm">
            <div class="card-body">
              <h2 class="h6 text-uppercase text-muted">Form Data</h2>
              <form id="crud-form" class="vstack gap-2">
                <input type="hidden" id="entity-id" />
                <label class="form-label mb-0">Kode</label>
                <input id="code" class="form-control" placeholder="Kode" />
                <label class="form-label mb-0">Nama</label>
                <input
                  id="name"
                  class="form-control"
                  placeholder="Nama"
                  required
                />
                <label class="form-label mb-0">Deskripsi</label>
                <textarea
                  id="description"
                  class="form-control"
                  rows="3"
                  placeholder="Deskripsi"
                ></textarea>
                <label class="form-label mb-0">Attributes (JSON)</label>
                <textarea
                  id="attributes"
                  class="form-control font-monospace"
                  rows="4"
                >
{}</textarea
                >
                <div class="d-flex gap-2 mt-2">
                  <button type="submit" class="btn btn-primary">Simpan</button>
                  <button
                    type="button"
                    id="btn-reset"
                    class="btn btn-outline-secondary"
                  >
                    Reset
                  </button>
                </div>
                <small id="status-text" class="text-muted">Siap</small>
              </form>
            </div>
          </div>
        </div>

        <div class="col-lg-8">
          <div class="card border-0 shadow-sm">
            <div class="card-body">
              <div
                class="d-flex justify-content-between align-items-center mb-3"
              >
                <h2 class="h6 text-uppercase text-muted mb-0">Daftar Data</h2>
                <a href="/ui/dashboard" class="btn btn-sm btn-outline-dark"
                  >Kembali ke Dashboard</a
                >
              </div>
              <div class="row g-2 mb-3">
                <div class="col-md-5">
                  <input
                    id="query"
                    class="form-control"
                    placeholder="Cari nama atau kode"
                  />
                </div>
                <div class="col-md-2">
                  <input
                    id="page"
                    type="number"
                    class="form-control"
                    value="1"
                    min="1"
                  />
                </div>
                <div class="col-md-2">
                  <select id="limit" class="form-select">
                    <option value="10" selected>10</option>
                    <option value="20">20</option>
                    <option value="50">50</option>
                  </select>
                </div>
                <div class="col-md-3 d-grid">
                  <button
                    id="btn-search"
                    type="button"
                    class="btn btn-outline-primary"
                  >
                    Cari / Refresh
                  </button>
                </div>
              </div>
              <div class="table-responsive">
                <table class="table table-striped table-hover align-middle">
                  <thead>
                    <tr>
                      <th>ID</th>
                      <th>Kode</th>
                      <th>Nama</th>
                      <th>Deskripsi</th>
                      <th>Attributes</th>
                      <th>Aksi</th>
                    </tr>
                  </thead>
                  <tbody id="table-body"></tbody>
                </table>
              </div>
              <div
                class="d-flex justify-content-between align-items-center mt-2"
              >
                <small id="meta-text" class="text-muted"
                  >Page 1 | Limit 10 | Total 0</small
                >
                <div class="d-flex gap-2">
                  <button
                    id="btn-prev"
                    type="button"
                    class="btn btn-sm btn-outline-secondary"
                  >
                    Prev
                  </button>
                  <button
                    id="btn-next"
                    type="button"
                    class="btn btn-sm btn-outline-secondary"
                  >
                    Next
                  </button>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="/assets/js/crud-page.js"></script>
  </body>
</html>
