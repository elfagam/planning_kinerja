
services:
  app:
    build: .
    restart: unless-stopped
    ports:
      - "7002:8080"
    environment:
      - HTTP_ADDR=:8080
      # 👇 SESUAIKAN DENGAN config.go ANDA
      - DB_HOST=db
      - DB_PORT=3306
      - DB_USER=root
      - DB_PASSWORD=rootpassword
      - DB_NAME=e-plan-ai
      - GIN_MODE=debug
      - TZ=Asia/Makassar
    depends_on:
      db:
        condition: service_healthy

  db:
    image: mysql:8.0
    ports:
      - "3307:3306"
    environment:
      - MYSQL_DATABASE=e-plan-ai
      - MYSQL_ROOT_PASSWORD=rootpassword
    healthcheck:
      test: ["CMD", "mysqladmin" ,"ping", "-h", "localhost"]
      timeout: 20s
      retries: 10
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init-db:/docker-entrypoint-initdb.d/init.sql

volumes:
  mysql_data:

