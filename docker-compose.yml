
services:
  app:
    build: .
    ports:
      - "7002:8080"
    environment:
      - HTTP_ADDR=0.0.0.0:8080
      - MYSQL_DSN=root:rootpassword@tcp(db:3306)/e-plan-ai?parseTime=true
      - AUTH_ENABLED=true
      - AUTH_TOKEN=change-me-in-production
    depends_on:
      db:
        condition: service_healthy

  db:
    image: mysql:8.0
    ports:
      - "3307:3306"
    environment:
      - MYSQL_DATABASE=e-plan-ai
      - MYSQL_ROOT_PASSWORD=rootpassword
    healthcheck:
      test: ["CMD", "mysqladmin" ,"ping", "-h", "localhost"]
      timeout: 20s
      retries: 10
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init-db:/docker-entrypoint-initdb.d/init.sql

volumes:
  mysql_data:

